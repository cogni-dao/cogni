# pnpm workspace configuration
# See: https://pnpm.io/workspaces

packages:
  # Legacy in-tree node workspaces. Submodule nodes live in their own repos and
  # must not become parent workspaces when checked out locally.
  - "nodes/operator/app"
  - "nodes/operator/graphs"
  - "nodes/operator/packages/*"
  # Shared packages (Node-owned, pure libraries)
  - "packages/*"
  # Operator services (future: git-review-daemon, git-admin-daemon)
  - "services/*"
