name: Candidate Flight

# Spec: work/items/task.0372 (per-node lane isolation, matrix fan-out).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to flight"
        required: true
        type: string
      head_sha:
        description: "Optional PR head SHA override"
        required: false
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: read
  statuses: write

concurrency:
  group: candidate-flight-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  SLOT: candidate-a
  OVERLAY_ENV: candidate-a

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      status_url: ${{ steps.meta.outputs.status_url }}
      digests_json: ${{ steps.images.outputs.digests_json }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      has_targets: ${{ steps.detect.outputs.has_targets }}
      needs_infra: ${{ steps.birth.outputs.needs_infra }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Resolve PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.base.ref')
          HEAD_SHA_INPUT="${{ inputs.head_sha }}"
          if [ -n "$HEAD_SHA_INPUT" ]; then
            HEAD_SHA="$HEAD_SHA_INPUT"
          else
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.head.sha')
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${{ inputs.pr_number }}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "status_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Report pending candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: pending
          DESCRIPTION: Candidate flight in progress
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      # Use the GitHub PR `files` API (same list as the Files Changed tab)
      # as the authoritative changed-paths source. `git diff origin/main...HEAD`
      # is unreliable here: when a branch is forked from a sibling branch
      # that later gets squash-merged into main, the original commits stay
      # reachable from HEAD and pollute the merge-base diff with paths the
      # PR never actually changed.
      - name: Fetch PR changed-paths from GitHub API
        id: pr-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          OUT: ${{ runner.temp }}/pr-changed-paths.txt
        run: |
          set -euo pipefail
          # Emit both filename and previous_filename so cross-directory
          # renames trigger rebuilds for the source side too (otherwise
          # renaming nodes/A/x.ts → nodes/B/x.ts only rebuilds B).
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          echo "ℹ️  PR #${PR_NUMBER} changed ${COUNT} path(s) (per GitHub API)"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"

      # Node BIRTH detection (CATALOG_IS_SSOT): a flight whose diff ADDS an
      # `infra/catalog/<slug>.yaml` is a birth — a brand-new node that needs its
      # edge route + DB + secret provisioned on the candidate-a VM in the SAME
      # flight (the "mochi gap": birth got pod+DNS but the edge 502'd, no DB/secret).
      # `status == added` from the PR files API is the authoritative ADD signal
      # (mirrors the changed-paths SSoT above; `git diff --diff-filter=A` is
      # unreliable across squash-merged sibling branches). Ordinary app flights
      # (no added catalog file) → needs_infra=false, preserving task.0314
      # app/infra independence.
      - name: Detect node birth (added catalog entry → needs_infra)
        id: birth
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          ADDED=$(gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | select(.status == "added") | .filename
                  | select(test("^infra/catalog/[^/]+\\.yaml$"))')
          if [ -n "$ADDED" ]; then
            echo "🐣 Node birth detected — added catalog entry(ies):"
            echo "$ADDED" | sed 's/^/  + /'
            echo "needs_infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️  No added infra/catalog/*.yaml — app-only flight (needs_infra=false)"
            echo "needs_infra=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect affected nodes
        id: detect
        working-directory: app-src
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: bash scripts/ci/detect-affected.sh

      - name: Set up Docker Buildx
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        if: steps.detect.outputs.has_targets == 'true'
        working-directory: app-src
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          SOURCE_SHA: ${{ steps.meta.outputs.head_sha }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash scripts/ci/resolve-pr-build-images.sh

      - name: Require at least one built image
        if: steps.detect.outputs.has_targets == 'true' && steps.images.outputs.has_images != 'true'
        run: |
          echo "::error::No pushed PR images found for ${{ steps.meta.outputs.image_tag }}"
          exit 1

      - name: Upload resolved-pr-images artifact
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/resolved-pr-images.json
          retention-days: 1

  reconcile-appset:
    needs: decide
    if: needs.decide.outputs.has_targets == 'true'
    # Single shared write to the candidate-a VM (kubectl apply on the AppSet).
    # Without this guard, two concurrent flights from different PRs race the
    # apply. See work/items/bug.0378.reconcile-appset-shared-write-race.md.
    concurrency:
      group: reconcile-appset-candidate-a
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source (for AppSet YAML)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Checkout app source (for AppSet YAML)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a — skipping AppSet reconcile"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply candidate-a-applicationset.yaml
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
        run: |
          set -euo pipefail
          APPSET_FILE="app-src/infra/k8s/argocd/candidate-a-applicationset.yaml"
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"

  flight:
    needs: [decide, reconcile-appset]
    if: needs.decide.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: candidate-flight-pipeline-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    outputs:
      head_sha: ${{ needs.decide.outputs.head_sha }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Download resolved-pr-images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/

      - name: Prepare per-node deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          git fetch origin "+refs/heads/deploy/*:refs/remotes/origin/deploy/*"
          if git rev-parse --verify --quiet "refs/remotes/origin/${PER_NODE_BRANCH}" >/dev/null; then
            git checkout -B "${PER_NODE_BRANCH}" "origin/${PER_NODE_BRANCH}"
          else
            echo "::warning::Per-node branch ${PER_NODE_BRANCH} missing — bootstrapping from deploy/${{ matrix.env }}"
            git fetch origin "deploy/${{ matrix.env }}"
            git checkout -B "${PER_NODE_BRANCH}" "origin/deploy/${{ matrix.env }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Snapshot deploy-branch overlay digests (pre-rsync)
        id: snapshot
        working-directory: deploy-branch
        env:
          OVERLAY_ENV: candidate-a
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          bash ../ci-src/scripts/ci/snapshot-overlay-digests.sh > "$SNAPSHOT_FILE"
          echo "ℹ️  Pre-rsync overlay snapshot ($(wc -l < "$SNAPSHOT_FILE" | tr -d ' ') rows):"
          sed 's/^/  /' "$SNAPSHOT_FILE"

      - name: Sync base + per-node overlay + per-node catalog to deploy branch
        env:
          NODE: ${{ matrix.node }}
        run: |
          set -euo pipefail
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          mkdir -p "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}"
          rsync -a --delete \
            "app-src/infra/k8s/overlays/candidate-a/${NODE}/" \
            "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}/"
          mkdir -p deploy-branch/infra/catalog
          cp "app-src/infra/catalog/${NODE}.yaml" "deploy-branch/infra/catalog/${NODE}.yaml"
          if [ -d "app-src/nodes/${NODE}/k8s/external-secrets/candidate-a" ]; then
            mkdir -p "deploy-branch/nodes/${NODE}/k8s/external-secrets/candidate-a"
            rsync -a --delete \
              "app-src/nodes/${NODE}/k8s/external-secrets/candidate-a/" \
              "deploy-branch/nodes/${NODE}/k8s/external-secrets/candidate-a/"
          fi

      - name: Promote this node's digest
        id: promote
        working-directory: deploy-branch
        env:
          PAYLOAD_FILE: ${{ runner.temp }}/resolved-pr-images.json
          OVERLAY_ENV: candidate-a
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
          COGNI_CATALOG_ROOT: ../app-src/infra/catalog
        run: NODES="$NODE" bash ../ci-src/scripts/ci/promote-build-payload.sh

      - name: Restore non-promoted overlay digests (post-rsync self-heal)
        working-directory: deploy-branch
        env:
          PROMOTED_APPS: ${{ steps.promote.outputs.promoted_apps }}
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          set -euo pipefail
          if [ ! -s "$SNAPSHOT_FILE" ]; then
            echo "ℹ️  No snapshot rows (cold-start) — nothing to restore"
            exit 0
          fi
          # shellcheck source=../ci-src/scripts/ci/lib/image-tags.sh
          . ../ci-src/scripts/ci/lib/image-tags.sh
          declare -A snap=()
          while IFS=$'\t' read -r app ref; do
            [ -n "$app" ] && snap["$app"]="$ref"
          done < "$SNAPSHOT_FILE"
          promoted_padded=" $(echo "$PROMOTED_APPS" | tr ',' ' ' | tr -s ' ') "
          for target in "${ALL_TARGETS[@]}"; do
            if [[ "$promoted_padded" == *" $target "* ]]; then
              continue
            fi
            ref="${snap[$target]:-}"
            [ -z "$ref" ] && continue
            [[ "$ref" != *"@sha256:"* ]] && continue
            bash ../ci-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env candidate-a --app "$target" --digest "$ref"
          done

      - name: Commit and push to per-node deploy branch
        id: push-deploy
        working-directory: deploy-branch
        env:
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy-state changes to push"
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "candidate-flight ${NODE}: pr-${{ inputs.pr_number }} ${HEAD_SHA}"
          git push origin "HEAD:${PER_NODE_BRANCH}"
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      # GHA matrix-job outputs collapse to the last cell's value; per-node
      # artifact is the per-cell contract verify-candidate reads.
      - name: Upload per-cell deploy_branch_sha artifact
        if: always()
        env:
          NODE: ${{ matrix.node }}
          DEPLOY_SHA: ${{ steps.push-deploy.outputs.deploy_branch_sha }}
        run: |
          mkdir -p deploy-sha-out
          printf '%s' "${DEPLOY_SHA:-}" > "deploy-sha-out/deploy-sha-${NODE}.txt"
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deploy-sha-${{ matrix.node }}
          path: deploy-sha-out/deploy-sha-${{ matrix.node }}.txt
          retention-days: 1

  # Per-node public DNS. The node's overlay/secrets/DB all auto-fan on flight,
  # but `<node>-test.<root>` only resolved if someone hand-made a Cloudflare A
  # record (no `*-test` wildcard) — so a freshly-created node deployed but its
  # public URL failed at DNS. This reconciles one A record per non-primary
  # catalog node → the env VM IP (idempotent), so verify-candidate's smoke +
  # buildSha checks (which curl host_for_node(node, DOMAIN)) resolve.
  #
  # Depends only on `decide` (DNS is env-level, independent of the image build):
  # it runs on EVERY flight dispatch — including no-target ones — so it both
  # self-heals every node's record and is independently exercisable/validatable
  # without a node change. Idempotent + mirrors the apex proxy state, so a
  # no-op run is the proof the live write path is green.
  reconcile-dns:
    needs: [decide]
    if: needs.decide.result == 'success'
    # Serialize Cloudflare writes across concurrent flights (mirrors reconcile-appset).
    concurrency:
      group: reconcile-dns-candidate-a
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      # PR head, not the workflow default branch: a PR that ADDS a node carries
      # the new catalog entry + the reconcile script here, so DNS covers it.
      - name: Checkout app source (PR catalog + scripts)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Reconcile node DNS (per-node A records → VM IP)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          FORK_DOMAIN_ROOT: ${{ vars.FORK_DOMAIN_ROOT || 'cognidao.org' }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "::warning::Cloudflare secrets unset on candidate-a — skipping node DNS reconcile (newly-created nodes won't resolve)"
            exit 0
          fi
          bash scripts/ci/reconcile-node-dns.sh candidate-a

  # Node BIRTH infra lever, folded in-graph (the "mochi gap" fix). A flight that
  # ADDS a catalog entry births a node: its overlay/digest fan out via `flight`,
  # its DNS via `reconcile-dns`, but its edge route + DB + secret only exist once
  # `deploy-infra.sh` runs against the candidate-a VM. Mirrors promote-and-deploy.yml's
  # deploy-infra job (same env block, idempotent compose-up) + candidate-flight-infra.yml's
  # logic, gated `needs_infra` so ORDINARY app flights skip it (task.0314 independence
  # preserved — coupling fires ONLY on birth). The standalone candidate-flight-infra.yml
  # lever stays for infra-only/manual dispatch.
  deploy-infra:
    needs: [decide, flight]
    if: |
      needs.decide.outputs.needs_infra == 'true' &&
      needs.flight.result == 'success'
    runs-on: ubuntu-latest
    environment: candidate-a
    # Mirror promote-and-deploy.yml: a cold-cache VM provisioning a NEW node
    # pulls sandbox + LiteLLM images before db-provision; 15m is too short.
    timeout-minutes: 45
    concurrency:
      group: deploy-infra-candidate-a
      cancel-in-progress: false
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: candidate-a
      APP_ENV: production
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ needs.decide.outputs.head_sha }}
      GIT_READ_USERNAME: Cogni-1729
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SERVICE_URL: ${{ secrets.DATABASE_SERVICE_URL }}
      POSTGRES_ROOT_USER: ${{ secrets.POSTGRES_ROOT_USER }}
      POSTGRES_ROOT_PASSWORD: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      APP_DB_USER: ${{ secrets.APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_SERVICE_USER: ${{ secrets.APP_DB_SERVICE_USER }}
      APP_DB_SERVICE_PASSWORD: ${{ secrets.APP_DB_SERVICE_PASSWORD }}
      APP_DB_READONLY_USER: ${{ secrets.APP_DB_READONLY_USER }}
      APP_DB_READONLY_PASSWORD: ${{ secrets.APP_DB_READONLY_PASSWORD }}
      APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
      TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
      TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      GHCR_USERNAME: Cogni-1729
      ACTIONS_AUTOMATION_BOT_PAT: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
      GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
      GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
      GRAFANA_CLOUD_LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
      PROMETHEUS_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
      PROMETHEUS_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}
      PROMETHEUS_QUERY_URL: ${{ secrets.PROMETHEUS_QUERY_URL }}
      PROMETHEUS_READ_USERNAME: ${{ secrets.PROMETHEUS_READ_USERNAME }}
      PROMETHEUS_READ_PASSWORD: ${{ secrets.PROMETHEUS_READ_PASSWORD }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      SCHEDULER_API_TOKEN: ${{ secrets.SCHEDULER_API_TOKEN }}
      BILLING_INGEST_TOKEN: ${{ secrets.BILLING_INGEST_TOKEN }}
      INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      OPENCLAW_GITHUB_RW_TOKEN: ${{ secrets.OPENCLAW_GITHUB_RW_TOKEN }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
      DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      DOLTHUB_REMOTE_URL: ${{ secrets.DOLTHUB_REMOTE_URL }}
      DOLT_CREDS_JWK: ${{ secrets.DOLT_CREDS_JWK }}
      DOLT_CREDS_KEYID: ${{ secrets.DOLT_CREDS_KEYID }}
      DOLTHUB_API_TOKEN: ${{ secrets.DOLTHUB_API_TOKEN }}
      DOLTHUB_OAUTH_CLIENT_ID: ${{ secrets.DOLTHUB_OAUTH_CLIENT_ID }}
      DOLTHUB_OAUTH_CLIENT_SECRET: ${{ secrets.DOLTHUB_OAUTH_CLIENT_SECRET }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GRAFANA_PDC_SIGNING_TOKEN: ${{ secrets.GRAFANA_PDC_SIGNING_TOKEN }}
      GRAFANA_PDC_HOSTED_GRAFANA_ID: ${{ secrets.GRAFANA_PDC_HOSTED_GRAFANA_ID }}
      GRAFANA_PDC_CLUSTER: ${{ secrets.GRAFANA_PDC_CLUSTER }}
      GRAFANA_PDC_NETWORK_ID: ${{ secrets.GRAFANA_PDC_NETWORK_ID }}
      GRAFANA_PDC_NETWORK_UUID: ${{ secrets.GRAFANA_PDC_NETWORK_UUID }}
      GH_REVIEW_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_REVIEW_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
      GH_REPOS: ${{ vars.GH_REPOS }}
      GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_SIGNING_KEY: ${{ secrets.PRIVY_SIGNING_KEY }}
      PRIVY_USER_WALLETS_APP_ID: ${{ secrets.PRIVY_USER_WALLETS_APP_ID }}
      PRIVY_USER_WALLETS_APP_SECRET: ${{ secrets.PRIVY_USER_WALLETS_APP_SECRET }}
      PRIVY_USER_WALLETS_SIGNING_KEY: ${{ secrets.PRIVY_USER_WALLETS_SIGNING_KEY }}
      POLY_WALLET_AEAD_KEY_HEX: ${{ secrets.POLY_WALLET_AEAD_KEY_HEX }}
      POLY_WALLET_AEAD_KEY_ID: ${{ secrets.POLY_WALLET_AEAD_KEY_ID }}
      POLY_WALLET_ALLOW_STUB_CREDS: ${{ secrets.POLY_WALLET_ALLOW_STUB_CREDS }}
      POLY_CLOB_GEO_BLOCK_TOKEN: ${{ secrets.POLY_CLOB_GEO_BLOCK_TOKEN }}
      COPY_TRADE_TARGET_WALLETS: ${{ secrets.COPY_TRADE_TARGET_WALLETS }}
      CONNECTIONS_ENCRYPTION_KEY: ${{ secrets.CONNECTIONS_ENCRYPTION_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      COGNI_NODE_DBS: ${{ secrets.COGNI_NODE_DBS }}
    steps:
      - name: Checkout app source (catalog + scripts at PR head)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup SSH
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST — skipping infra deploy"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Preflight Grafana PDC signing token
        if: env.VM_HOST != '' && env.GRAFANA_PDC_SIGNING_TOKEN != ''
        run: bash scripts/grafana-pdc-token-preflight.sh

      - name: Deploy Compose infra (edge + DB + secret) to candidate-a VM
        if: env.VM_HOST != ''
        run: bash scripts/ci/deploy-infra.sh --ref "$COGNI_REPO_REF"

      - name: Provision Grafana Postgres datasources
        if: env.VM_HOST != ''
        run: bash scripts/ci/provision-grafana-postgres-datasources.sh

      - name: Verify Grafana Postgres datasources
        if: env.VM_HOST != ''
        continue-on-error: true
        run: bash scripts/ci/verify-grafana-postgres-datasources.sh

  verify-candidate:
    # `deploy-infra` joins `needs:` so a node BIRTH provisions its edge/DB/secret
    # BEFORE the contract probes run (mochi-gap fix). The `success || skipped` gate
    # mirrors promote-and-deploy.yml: a non-birth (app-only) flight SKIPS deploy-infra
    # yet verify-candidate still runs — task.0314 independence preserved.
    needs: [decide, flight, reconcile-dns, deploy-infra]
    if: |
      always() &&
      needs.decide.outputs.has_targets == 'true' &&
      needs.flight.result == 'success' &&
      needs.reconcile-dns.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: candidate-flight-pipeline-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Checkout per-node deploy branch (for source-sha map)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: deploy/${{ matrix.env }}-${{ matrix.node }}
          path: deploy-branch
          token: ${{ github.token }}

      - name: Download per-cell deploy_branch_sha
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: deploy-sha-${{ matrix.node }}
          path: ${{ runner.temp }}/

      - name: Resolve EXPECTED_SHA
        id: expected
        env:
          ARTIFACT_FILE: ${{ runner.temp }}/deploy-sha-${{ matrix.node }}.txt
        run: |
          set -euo pipefail
          DEPLOY_SHA=$(cat "$ARTIFACT_FILE" 2>/dev/null || true)
          if [ -z "$DEPLOY_SHA" ]; then
            echo "::error::Per-cell deploy_branch_sha artifact empty for ${{ matrix.node }}"
            exit 1
          fi
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a — skipping verification"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for ArgoCD sync (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: candidate-a
          EXPECTED_SHA: ${{ steps.expected.outputs.deploy_branch_sha }}
          PROMOTED_APPS: ${{ matrix.node }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for candidate readiness
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-candidate-ready.sh

      - name: Wait for in-cluster services (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_ENVIRONMENT: candidate-a
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Run candidate smoke checks (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/smoke-candidate.sh

      - name: Verify buildSha on endpoint (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          EXPECTED_BUILDSHA: ${{ needs.decide.outputs.head_sha }}
          NODES: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/verify-buildsha.sh

  report-status:
    needs: [decide, flight, verify-candidate]
    if: always() && needs.decide.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Decide aggregate state
        id: decide
        env:
          HAS_TARGETS: ${{ needs.decide.outputs.has_targets }}
          FLIGHT_RESULT: ${{ needs.flight.result }}
          VERIFY_RESULT: ${{ needs.verify-candidate.result }}
          TARGETS_JSON: ${{ needs.decide.outputs.targets_json }}
        run: |
          set -euo pipefail
          echo "has_targets=${HAS_TARGETS} flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT} targets=${TARGETS_JSON}"
          if [ "$HAS_TARGETS" != "true" ]; then
            STATE=success
            DESC="Candidate flight no-op (no affected nodes)"
          elif [ "$FLIGHT_RESULT" = "success" ] && [ "$VERIFY_RESULT" = "success" ]; then
            STATE=success
            DESC="Candidate flight passed (matrix: ${TARGETS_JSON})"
          elif [ "$FLIGHT_RESULT" = "failure" ] || [ "$VERIFY_RESULT" = "failure" ]; then
            STATE=failure
            DESC="Candidate flight failed (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          elif [ "$FLIGHT_RESULT" = "cancelled" ] || [ "$VERIFY_RESULT" = "cancelled" ]; then
            STATE=failure
            DESC="Candidate flight cancelled"
          else
            STATE=failure
            DESC="Candidate flight indeterminate (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"

      - name: Report terminal candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.decide.outputs.head_sha }}
          STATE: ${{ steps.decide.outputs.state }}
          DESCRIPTION: ${{ steps.decide.outputs.description }}
          TARGET_URL: ${{ needs.decide.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      - name: Fail job on aggregate failure
        if: steps.decide.outputs.state == 'failure'
        run: |
          echo "::error::${{ steps.decide.outputs.description }}"
          exit 1
