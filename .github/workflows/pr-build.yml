name: PR Build

# Four-stage pipeline (task.0321 + task.0391):
#   resolve → detect → build (matrix, one leg per affected target) → manifest
# Each matrix leg builds+pushes a single target in parallel; the manifest
# job merges per-leg fragments into the canonical build-manifest.json
# artifact so downstream candidate-flight consumers see no contract change.
#
# ONE artifact identity: every event publishes `<image_repository>:sha-<sourceSha>`
# (SOURCE_SHA_IS_DEPLOY_IDENTITY / BUILD_ONCE_PROMOTE_DIGEST, node-ci-cd-contract.md).
# The legacy pr-{N}-{X} / mq-{N}-{Y} / preview-{sha} split-brain is purged — the
# operator app artifact now follows the same contract as every node-template node.
#
# Triggers (mirrors Cogni-DAO/node-template's pr-build.yml):
# - pull_request: builds at PR head SHA → sha-{headSHA}. PR-time CI signal +
#   the `manifest` required check (same-repo PRs push; forks build via the G2 lane).
# - merge_group: builds at the queue's rebased candidate SHA Y → sha-{Y}. Produces
#   the `manifest` required check the merge queue waits on; Y == the squash-merged
#   main SHA, so flight-preview finds sha-{mainSHA} already built when it runs.
# - push:main: builds at the merged main SHA → sha-{mainSHA}. This is what makes the
#   operator self-deployable on EVERY merge — incl. a direct/admin/`/vcs/merge`
#   squash that bypasses the queue (the #1792 undeployable-main fix). On a queue
#   merge it is a redundant cache-hot rebuild of the same sha- (accepted, matches
#   node-template). The merge queue STAYS — it is the merge gate, orthogonal to
#   the build trigger.

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  # Operator-dispatched TRUSTED build of an approved PR head — the same resolve →
  # detect → build → manifest jobs, just sourced from head_repo@head_sha. This is
  # the only way a fork contributor's PR (whose `pull_request` run has a read-only
  # token and cannot push) gets a flightable `sha-<head_sha>` image: the operator
  # GitHub App dispatches this in the BASE repo (packages:write) AFTER RBAC
  # approval (node.flight). No separate workflow, no bespoke code — one build path.
  workflow_dispatch:
    inputs:
      head_repo:
        description: "PR head repo owner/name (e.g. flock-leader/cogni)"
        required: true
        type: string
      head_sha:
        description: "PR head SHA (40-char hex) — the tree built + tagged sha-<head_sha>"
        required: true
        type: string
      pr_number:
        description: "PR number in the base repo (drives affected-only detection)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

# Different concurrency keys per event type. Cross-event races (force-push to
# an enqueued PR) are eliminated by the queue's eviction-on-push behavior.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-build-pr-{0}', github.event.pull_request.number) || github.event_name == 'merge_group' && format('pr-build-mq-{0}', github.event.merge_group.head_ref) || github.event_name == 'workflow_dispatch' && format('pr-build-dispatch-{0}', inputs.head_sha) || format('pr-build-push-{0}', github.ref) }}
  # Cancel superseded PR / merge_group / dispatch runs, but NEVER cancel a
  # push:main build — it publishes the deployable sha-<mainSha> image (cancelling
  # would drop it).
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  # FORK_FREEDOM: owner-derived so a fork pushes to its OWN GHCR namespace (image-tags.sh
  # lowercases). Canonical Cogni-DAO → cogni-dao (unchanged); cogni-test-org → its own ns.
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cogni-template

jobs:
  # task.0391: single source of truth for event-derived metadata.
  # `pull_request` and `merge_group` have different event payloads but downstream
  # jobs need the same logical values (PR number, original head SHA, base ref,
  # build SHA, checkout ref). Resolve once here; downstream jobs read outputs.
  resolve:
    runs-on: ubuntu-latest
    # Build on: push:main (the self-deploy build), merge_group (the queue's
    # `manifest` check), and same-repo PRs (PR-time signal). Fork PRs are handled
    # by the operator G2 lane, not here. Skip maintenance commits on main that
    # carry no deployable change (mirrors flight-preview.yml's guard).
    if: |
      (github.event_name == 'push' &&
        !startsWith(github.event.head_commit.message, 'chore(deps): argocd-image-updater') &&
        !startsWith(github.event.head_commit.message, 'chore(preview):')) ||
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      pr_number: ${{ steps.r.outputs.pr_number }}
      source_sha: ${{ steps.r.outputs.source_sha }}
      checkout_repo: ${{ steps.r.outputs.checkout_repo }}
      checkout_ref: ${{ steps.r.outputs.checkout_ref }}
      base_ref: ${{ steps.r.outputs.base_ref }}
      head_ref_name: ${{ steps.r.outputs.head_ref_name }}
      image_tag: ${{ steps.r.outputs.image_tag }}
      should_push: ${{ steps.r.outputs.should_push }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF_PR: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          MQ_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          MQ_BASE_REF: ${{ github.event.merge_group.base_ref }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA_PR: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF_PR: ${{ github.event.pull_request.base.ref }}
          PUSH_SHA: ${{ github.sha }}
          PUSH_REF_NAME: ${{ github.ref_name }}
          PUSH_SUBJECT: ${{ github.event.head_commit.message }}
          DISPATCH_HEAD_REPO: ${{ inputs.head_repo }}
          DISPATCH_HEAD_SHA: ${{ inputs.head_sha }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          # ONE identity for every event: SOURCE_SHA is the source revision being
          # built; the image tag is always `sha-<SOURCE_SHA>` (no pr-/mq-/preview-).
          # PR_NUMBER is resolved on all events purely to drive affected-only
          # detection (the GitHub PR files API in `detect`); it is NEVER the tag.
          PR_NUMBER=""
          SHOULD_PUSH=true
          # CHECKOUT_REPO defaults to this repo; only an operator workflow_dispatch
          # of an approved external PR head overrides it (head_repo).
          CHECKOUT_REPO="$REPO"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="$PR_NUMBER_PR"
            SOURCE_SHA="$PR_HEAD_SHA_PR"
            CHECKOUT_REF="$SOURCE_SHA"
            BASE_REF="$PR_BASE_REF_PR"
            HEAD_REF_NAME="$PR_HEAD_REF_PR"
            # FORK_FREEDOM: a fork PR builds for signal but cannot push to the
            # base GHCR namespace (the resolve `if` currently gates forks out, so
            # in practice this is always same-repo here; kept explicit for safety).
            [ "$PR_HEAD_REPO" = "$REPO" ] || SHOULD_PUSH=false
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Operator-dispatched TRUSTED build of an approved PR head (the base
            # token has packages:write). The tree comes from head_repo@head_sha;
            # this is the only path that gives a fork-contributor PR a flightable
            # sha-<head_sha> image. RBAC (node.flight) is enforced by the operator
            # BEFORE dispatch — GitHub workflow_dispatch is owner/App-gated.
            if [[ ! "$DISPATCH_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::head_sha must be a 40-char hex SHA"; exit 1
            fi
            if [[ ! "$DISPATCH_HEAD_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
              echo "::error::head_repo must be owner/name"; exit 1
            fi
            if [[ ! "$DISPATCH_PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::pr_number must be numeric"; exit 1
            fi
            PR_NUMBER="$DISPATCH_PR_NUMBER"
            SOURCE_SHA="$DISPATCH_HEAD_SHA"
            CHECKOUT_REPO="$DISPATCH_HEAD_REPO"
            CHECKOUT_REF="$DISPATCH_HEAD_SHA"
            BASE_REF="main"
            HEAD_REF_NAME="pr-${PR_NUMBER}"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            # head_ref: refs/heads/gh-readonly-queue/<base>/pr-<N>-<orig_head_sha>[-<salt>]
            PR_PATH="${MQ_HEAD_REF##*/}"
            if [[ "$PR_PATH" =~ ^pr-([0-9]+)- ]]; then
              PR_NUMBER="${BASH_REMATCH[1]}"
            fi
            SOURCE_SHA="$PUSH_SHA"       # queue/rebased commit (Y) == squash-merge main SHA
            CHECKOUT_REF="$PUSH_SHA"
            BASE_REF="${MQ_BASE_REF#refs/heads/}"
            HEAD_REF_NAME="${MQ_HEAD_REF#refs/heads/}"
          elif [ "$EVENT_NAME" = "push" ]; then
            SOURCE_SHA="$PUSH_SHA"        # merged main SHA — the self-deploy build
            CHECKOUT_REF="$PUSH_SHA"
            BASE_REF="main"
            HEAD_REF_NAME="$PUSH_REF_NAME"
            # Resolve the merged PR number from the commit subject `(#NNN)` for
            # affected-only detection (same primary path flight-preview.yml uses).
            # No PR (direct push) → empty → detect-affected falls back to full scope.
            PR_NUMBER=$(printf '%s' "$PUSH_SUBJECT" | sed -nE 's/.*\(#([0-9]+)\)[[:space:]]*$/\1/p' | head -1)
          else
            echo "::error::Unsupported event: $EVENT_NAME"
            exit 1
          fi
          IMAGE_TAG="sha-${SOURCE_SHA}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "checkout_repo=$CHECKOUT_REPO" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref_name=$HEAD_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "should_push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"

  detect:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      targets_csv: ${{ steps.detect.outputs.targets }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.checkout_repo }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      # Use the GitHub PR `files` API (same list as the Files Changed tab)
      # as the authoritative changed-paths source. `git diff origin/<base>...HEAD`
      # is unreliable here: when a branch is forked from a sibling branch
      # that later gets squash-merged into main, the original commits stay
      # reachable from HEAD and pollute the merge-base diff with paths the
      # PR never actually changed.
      - id: pr-files
        name: Fetch PR changed-paths from GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          OUT: ${{ runner.temp }}/pr-changed-paths.txt
        run: |
          set -euo pipefail
          # No PR resolved (a direct push to main with no `(#NNN)` subject):
          # emit no changed-paths file so detect-affected.sh falls back to its
          # full-scope build — never silently builds nothing.
          if [ -z "$PR_NUMBER" ]; then
            echo "ℹ️  No PR resolved for this event — detect-affected uses full scope"
            echo "changed_paths_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Emit both filename and previous_filename so cross-directory
          # renames trigger rebuilds for the source side too (otherwise
          # renaming nodes/A/x.ts → nodes/B/x.ts only rebuilds B).
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          echo "ℹ️  PR #${PR_NUMBER} changed ${COUNT} path(s) (per GitHub API)"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"

      - id: changed-catalog
        name: Detect catalog changes
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: |
          if grep -qE '^infra/catalog/' "$CHANGED_PATHS_FILE"; then
            echo "catalog_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "catalog_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate infra/catalog/*.yaml against schema
        if: steps.changed-catalog.outputs.catalog_changed == 'true'
        run: |
          pipx install 'check-jsonschema==0.37.1'
          check-jsonschema --schemafile infra/catalog/_schema.json infra/catalog/*.yaml
          # Cross-file node_port uniqueness — inexpressible in pure JSON-schema.
          # node_port is the per-VM k8s NodePort; a clash silently blackholes a
          # node (CATALOG_IS_SSOT, docs/spec/ci-cd.md axiom 16).
          bash scripts/ci/next-free-node-port.sh --check

      - name: Detect affected image targets
        id: detect
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: bash scripts/ci/detect-affected.sh

  build:
    needs: [resolve, detect]
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.source_sha }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.targets_json) }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.checkout_repo }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: needs.resolve.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        env:
          TARGETS: ${{ matrix.target }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # BUILD_SHA = SOURCE_SHA — the source revision baked into the image
          # (/version.buildSha == sourceSha, the deploy contract). One identity
          # across pull_request / merge_group / push:main (overrides the ephemeral
          # refs/pull/{N}/merge GITHUB_SHA on pull_request — see bug.0313).
          BUILD_SHA: ${{ needs.resolve.outputs.source_sha }}
          # FORK_FREEDOM: build for signal, push only when we own the namespace.
          SHOULD_PUSH: ${{ needs.resolve.outputs.should_push }}
          OUTPUT_FILE: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
        run: bash scripts/ci/build-and-push-images.sh

      - name: Upload build fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-build-fragment-${{ matrix.target }}-${{ needs.resolve.outputs.source_sha }}
          path: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
          retention-days: 1
          if-no-files-found: error
          overwrite: true

  manifest:
    needs: [resolve, detect, build]
    # Run when build succeeded, or when it was skipped because no targets were
    # affected. Any build-leg failure should fail this PR check — don't ship a
    # manifest for a partially built PR.
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      # Required by merge-build-fragments.sh + write-build-manifest.sh.
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.source_sha }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.checkout_repo }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download build fragments
        if: needs.detect.outputs.has_targets == 'true'
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/build-fragments
          pattern: pr-build-fragment-*-${{ needs.resolve.outputs.source_sha }}
          merge-multiple: true

      - name: Merge fragments into build-images.json
        env:
          FRAGMENTS_DIR: ${{ runner.temp }}/build-fragments
          OUTPUT_FILE: ${{ runner.temp }}/build-images.json
        run: bash scripts/ci/merge-build-fragments.sh

      - name: Write build manifest
        env:
          IMAGES_FILE: ${{ runner.temp }}/build-images.json
          MANIFEST_FILE: ${{ runner.temp }}/build-manifest.json
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ needs.resolve.outputs.head_ref_name }}
        run: bash scripts/ci/write-build-manifest.sh

      - name: Upload build manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest-${{ needs.resolve.outputs.source_sha }}
          path: ${{ runner.temp }}/build-manifest.json
          retention-days: 7
          if-no-files-found: error
          overwrite: true
