name: PR Build

# Four-stage pipeline (task.0321 + task.0391):
#   resolve → detect → build (matrix, one leg per affected target) → manifest
# Each matrix leg builds+pushes a single target in parallel; the manifest
# job merges per-leg fragments into the canonical build-manifest.json
# artifact so downstream candidate-flight consumers see no contract change.
#
# Triggers on `pull_request`, `merge_group` (task.0391), and `workflow_dispatch`
# (FORK_FREEDOM, replaces the parallel fork-pr-build.yml — one pipeline, three
# triggers, every job reused):
# - pull_request: builds at PR head SHA, tagged pr-{N}-{X}. PR-time CI signal,
#   consumed by candidate-flight.yml. Tag is IMMUTABLE post-build.
# - merge_group: builds at the queue's rebased candidate SHA Y, tagged
#   mq-{N}-{Y}. flight-preview.yml on push:main resolves this tag and re-tags
#   it as preview-{mainSHA}, so the preview env reflects the rebased tree
#   (PR #1033). Tag namespace is intentionally distinct from pr-{N}-{X} so
#   merge_group rebuilds cannot mutate the PR-time image — that mutation
#   broke candidate-flight verify-buildsha when a PR merged mid-flight
#   (bug.0412).
# - workflow_dispatch: OPERATOR-APPROVED, TRUSTED-CONTEXT build of a FORK PR's
#   HEAD. A fork PR's own `pull_request` event runs with a READ-ONLY
#   GITHUB_TOKEN and no `packages: write` (GitHub's fork security model), so the
#   `resolve` job's `head.repo.full_name == github.repository` gate skips it and
#   no image is ever built → fork code can't flight. This dispatch runs in the
#   BASE repo (writable token), checks out `{head_repo}@{head_sha}`, and builds
#   the SAME immutable `pr-{N}-{sha}` tag candidate-flight already resolves — no
#   new tag convention, no duplicated jobs. It NEVER auto-fires on fork push (no
#   pull_request_target / pwn-request); it is dispatched ONLY by the operator
#   App AFTER a developer-RBAC-gated approval (POST /api/v1/vcs/fork-build →
#   `can_flight` on the operator node). Permissions are GHCR-push only
#   (contents:read + packages:write) — no deploy/infra/promote secrets.

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Fork PR number (in the base repo)"
        required: true
        type: string
      head_repo:
        description: "Fork head repo, owner/name (e.g. flock-leader/cogni)"
        required: true
        type: string
      head_sha:
        description: "Fork PR head SHA (40-char hex) — the tree that gets built"
        required: true
        type: string

permissions:
  contents: read
  packages: write

# Different concurrency keys per event type. Cross-event races (force-push to
# an enqueued PR) are eliminated by the queue's eviction-on-push behavior.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-build-pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && format('pr-build-fork-{0}-{1}', inputs.pr_number, inputs.head_sha)) || format('pr-build-mq-{0}', github.event.merge_group.head_ref) }}
  cancel-in-progress: true

env:
  # FORK_FREEDOM: owner-derived so a fork pushes to its OWN GHCR namespace (image-tags.sh
  # lowercases). Canonical Cogni-DAO → cogni-dao (unchanged); cogni-test-org → its own ns.
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cogni-template

jobs:
  # task.0391: single source of truth for event-derived metadata.
  # `pull_request` and `merge_group` have different event payloads but downstream
  # jobs need the same logical values (PR number, original head SHA, base ref,
  # build SHA, checkout ref). Resolve once here; downstream jobs read outputs.
  resolve:
    runs-on: ubuntu-latest
    # workflow_dispatch is the operator-approved fork-build trigger — it is
    # dispatch-only (never a fork push), so it is admitted unconditionally; the
    # same-repo `head.repo.full_name == github.repository` gate still keeps a
    # fork's OWN `pull_request` event out of the build path (FORK_FREEDOM).
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      pr_number: ${{ steps.r.outputs.pr_number }}
      original_head_sha: ${{ steps.r.outputs.original_head_sha }}
      build_sha: ${{ steps.r.outputs.build_sha }}
      checkout_ref: ${{ steps.r.outputs.checkout_ref }}
      # checkout_repo: the fork repo on workflow_dispatch, empty (→ this repo)
      # otherwise. Downstream checkouts default to the current repo when empty.
      checkout_repo: ${{ steps.r.outputs.checkout_repo }}
      base_ref: ${{ steps.r.outputs.base_ref }}
      head_ref_name: ${{ steps.r.outputs.head_ref_name }}
      image_tag: ${{ steps.r.outputs.image_tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF_PR: ${{ github.event.pull_request.head.ref }}
          MQ_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          MQ_BASE_REF: ${{ github.event.merge_group.base_ref }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA_PR: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF_PR: ${{ github.event.pull_request.base.ref }}
          PUSH_SHA: ${{ github.sha }}
          # FORK_FREEDOM workflow_dispatch inputs (empty for pull_request / merge_group).
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          DISPATCH_HEAD_REPO: ${{ inputs.head_repo }}
          DISPATCH_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          set -euo pipefail
          CHECKOUT_REPO=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Operator-approved fork build. Validate inputs strictly (the dispatch
            # carries the trusted GHCR-push token, so the fork-supplied values must
            # be well-formed before they drive a checkout/build).
            if [[ ! "$DISPATCH_PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::pr_number must be numeric (got: $DISPATCH_PR_NUMBER)"; exit 1
            fi
            if [[ ! "$DISPATCH_HEAD_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
              echo "::error::head_repo must be owner/name (got: $DISPATCH_HEAD_REPO)"; exit 1
            fi
            if [[ ! "$DISPATCH_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::head_sha must be a 40-char hex SHA (got: $DISPATCH_HEAD_SHA)"; exit 1
            fi
            PR_NUMBER="$DISPATCH_PR_NUMBER"
            ORIGINAL_HEAD_SHA="$DISPATCH_HEAD_SHA"
            BUILD_SHA="$ORIGINAL_HEAD_SHA"   # baked into /version.buildSha — same as pull_request
            CHECKOUT_REF="$ORIGINAL_HEAD_SHA"
            CHECKOUT_REPO="$DISPATCH_HEAD_REPO"  # the fork tree gets built in this (base) trusted context
            BASE_REF="main"
            HEAD_REF_NAME="$ORIGINAL_HEAD_SHA"
            # IMMUTABLE pr-{N}-{sha} — identical to the pull_request path so
            # candidate-flight resolves the fork build with no contract change.
            IMAGE_TAG="pr-${PR_NUMBER}-${ORIGINAL_HEAD_SHA}"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "original_head_sha=$ORIGINAL_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
            echo "checkout_repo=$CHECKOUT_REPO" >> "$GITHUB_OUTPUT"
            echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
            echo "head_ref_name=$HEAD_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="$PR_NUMBER_PR"
            ORIGINAL_HEAD_SHA="$PR_HEAD_SHA_PR"
            BUILD_SHA="$ORIGINAL_HEAD_SHA"
            CHECKOUT_REF="$ORIGINAL_HEAD_SHA"
            BASE_REF="$PR_BASE_REF_PR"
            HEAD_REF_NAME="$PR_HEAD_REF_PR"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            # head_ref format: refs/heads/gh-readonly-queue/<base>/pr-<N>-<orig_head_sha>[-<salt>]
            # The head SHA in the ref name may be an abbreviated prefix (~7 chars);
            # we look up the full SHA via API to keep pr-{N}-{X} tag consistent
            # with what pr-build(pull_request) produced.
            PR_PATH="${MQ_HEAD_REF##*/}" # "pr-<N>-<sha>[-<salt>]"
            if [[ ! "$PR_PATH" =~ ^pr-([0-9]+)- ]]; then
              echo "::error::Could not parse PR number from merge_group head_ref: $MQ_HEAD_REF"
              exit 1
            fi
            PR_NUMBER="${BASH_REMATCH[1]}"
            ORIGINAL_HEAD_SHA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha')
            if [ -z "$ORIGINAL_HEAD_SHA" ] || [ "$ORIGINAL_HEAD_SHA" = "null" ]; then
              echo "::error::Could not resolve full head SHA for PR #${PR_NUMBER}"
              exit 1
            fi
            BUILD_SHA="$PUSH_SHA"      # queue commit (Y) — what's actually built
            CHECKOUT_REF="$PUSH_SHA"   # checkout the queue commit (Y's tree)
            BASE_REF="${MQ_BASE_REF#refs/heads/}"
            HEAD_REF_NAME="${MQ_HEAD_REF#refs/heads/}"
          else
            echo "::error::Unsupported event: $EVENT_NAME"
            exit 1
          fi
          # bug.0412 — split tag namespaces so merge_group rebuilds cannot
          # mutate the immutable pull_request-time image that candidate-flight
          # consumes. pull_request → pr-{N}-{X}; merge_group → mq-{N}-{Y}.
          if [ "$EVENT_NAME" = "merge_group" ]; then
            IMAGE_TAG="mq-${PR_NUMBER}-${BUILD_SHA}"
          else
            IMAGE_TAG="pr-${PR_NUMBER}-${ORIGINAL_HEAD_SHA}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "original_head_sha=$ORIGINAL_HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "build_sha=$BUILD_SHA" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "checkout_repo=$CHECKOUT_REPO" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref_name=$HEAD_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  detect:
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      targets_csv: ${{ steps.detect.outputs.targets }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          # Defaults to this repo on pull_request/merge_group; the fork repo on
          # the operator-approved workflow_dispatch (FORK_FREEDOM).
          repository: ${{ needs.resolve.outputs.checkout_repo || github.repository }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      # Use the GitHub PR `files` API (same list as the Files Changed tab)
      # as the authoritative changed-paths source. `git diff origin/<base>...HEAD`
      # is unreliable here: when a branch is forked from a sibling branch
      # that later gets squash-merged into main, the original commits stay
      # reachable from HEAD and pollute the merge-base diff with paths the
      # PR never actually changed.
      - id: pr-files
        name: Fetch PR changed-paths from GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          OUT: ${{ runner.temp }}/pr-changed-paths.txt
        run: |
          set -euo pipefail
          # Emit both filename and previous_filename so cross-directory
          # renames trigger rebuilds for the source side too (otherwise
          # renaming nodes/A/x.ts → nodes/B/x.ts only rebuilds B).
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          echo "ℹ️  PR #${PR_NUMBER} changed ${COUNT} path(s) (per GitHub API)"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"

      - id: changed-catalog
        name: Detect catalog changes
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: |
          if grep -qE '^infra/catalog/' "$CHANGED_PATHS_FILE"; then
            echo "catalog_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "catalog_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate infra/catalog/*.yaml against schema
        if: steps.changed-catalog.outputs.catalog_changed == 'true'
        run: |
          pipx install 'check-jsonschema==0.37.1'
          check-jsonschema --schemafile infra/catalog/_schema.json infra/catalog/*.yaml
          # Cross-file node_port uniqueness — inexpressible in pure JSON-schema.
          # node_port is the per-VM k8s NodePort; a clash silently blackholes a
          # node (CATALOG_IS_SSOT, docs/spec/ci-cd.md axiom 16).
          bash scripts/ci/next-free-node-port.sh --check

      - name: Detect affected image targets
        id: detect
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: bash scripts/ci/detect-affected.sh

  build:
    needs: [resolve, detect]
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.original_head_sha }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.targets_json) }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.checkout_repo || github.repository }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        env:
          TARGETS: ${{ matrix.target }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On pull_request: BUILD_SHA = PR head SHA (overrides the ephemeral
          # refs/pull/{N}/merge commit GITHUB_SHA — see bug.0313).
          # On merge_group: BUILD_SHA = queue commit SHA (Y) — the actual
          # rebased tree being built. /readyz reports this so deployed pods
          # report the SHA whose tree they were built from.
          BUILD_SHA: ${{ needs.resolve.outputs.build_sha }}
          OUTPUT_FILE: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
        run: bash scripts/ci/build-and-push-images.sh

      - name: Upload build fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-build-fragment-${{ matrix.target }}-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.original_head_sha }}-${{ needs.resolve.outputs.build_sha }}
          path: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
          retention-days: 1
          if-no-files-found: error
          overwrite: true

  manifest:
    needs: [resolve, detect, build]
    # Run when build succeeded, or when it was skipped because no targets were
    # affected. Any build-leg failure should fail this PR check — don't ship a
    # manifest for a partially built PR.
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      # Required by merge-build-fragments.sh + write-build-manifest.sh.
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
      HEAD_SHA: ${{ needs.resolve.outputs.original_head_sha }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          repository: ${{ needs.resolve.outputs.checkout_repo || github.repository }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download build fragments
        if: needs.detect.outputs.has_targets == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/build-fragments
          pattern: pr-build-fragment-*-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.original_head_sha }}-${{ needs.resolve.outputs.build_sha }}
          merge-multiple: true

      - name: Merge fragments into build-images.json
        env:
          FRAGMENTS_DIR: ${{ runner.temp }}/build-fragments
          OUTPUT_FILE: ${{ runner.temp }}/build-images.json
        run: bash scripts/ci/merge-build-fragments.sh

      - name: Write build manifest
        env:
          IMAGES_FILE: ${{ runner.temp }}/build-images.json
          MANIFEST_FILE: ${{ runner.temp }}/build-manifest.json
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ needs.resolve.outputs.head_ref_name }}
        run: bash scripts/ci/write-build-manifest.sh

      - name: Upload build manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest-pr-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.original_head_sha }}-${{ needs.resolve.outputs.build_sha }}
          path: ${{ runner.temp }}/build-manifest.json
          retention-days: 7
          if-no-files-found: error
          overwrite: true
