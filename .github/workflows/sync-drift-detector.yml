name: Sync Drift Detector

# Implements spec.repo-sync-contract S2 (drift surfacing).
# Walks every hub file not covered by .cogni/sync-manifest.yaml's exclude or
# per-artifact divergence rules; diffs each against a fresh clone of each
# public artifact; upserts a tracking issue on the hub labeled `sync-drift`
# with the markdown report body.
#
# Triggers:
# - schedule: daily at 14:00 UTC (07:00 PT) — picks up overnight drift.
# - workflow_dispatch: manual trigger for ad-hoc runs / contract tests.
# - push to main when the manifest or detector script itself changes —
#   any change to the contract should re-run the report immediately.
#
# Permissions:
# - contents: read — checkout this repo
# - issues: write — upsert the tracking issue
# (No write to artifact repos — that is v0.2.)

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".cogni/sync-manifest.yaml"
      - ".cogni/sync-manifest.schema.json"
      - "scripts/ci/detect-sync-drift.mjs"
      - ".github/workflows/sync-drift-detector.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-drift-detector
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (yaml parser only — production install not needed)
        run: pnpm install --frozen-lockfile

      - name: Run detector
        id: run
        env:
          HUB_DIR: ${{ github.workspace }}
          HUB_REF: HEAD
        run: |
          set -o pipefail
          node scripts/ci/detect-sync-drift.mjs | tee /tmp/drift-report.md
          # Extract drift count for the issue title
          COUNT=$(tail -3 /tmp/drift-report.md | grep -oE '\*\*[0-9]+\*\*' | tr -d '*' | head -1)
          echo "count=${COUNT:-0}" >> "$GITHUB_OUTPUT"

      - name: Upsert hub sync-drift tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT_COUNT: ${{ steps.run.outputs.count }}
          REPORT_PATH: /tmp/drift-report.md
        run: |
          set -euo pipefail
          TITLE="sync-drift: ${DRIFT_COUNT} item(s) across artifact repos"
          # Find existing open issue by label
          EXISTING=$(gh issue list --label sync-drift --state open --limit 1 --json number --jq '.[0].number // empty')
          # Build body (truncate to 60KB to stay under GitHub's 65536-char body limit)
          {
            echo "_Auto-generated by \`.github/workflows/sync-drift-detector.yml\` at $(date -u +%Y-%m-%dT%H:%M:%SZ) for sha ${GITHUB_SHA:0:8}._"
            echo
            head -c 60000 "$REPORT_PATH"
            BYTES=$(wc -c < "$REPORT_PATH")
            if [ "$BYTES" -gt 60000 ]; then echo; echo "_(report truncated — full body was $BYTES bytes)_"; fi
          } > /tmp/issue-body.md
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --title "$TITLE" --body-file /tmp/issue-body.md
            echo "✏️  updated issue #$EXISTING"
          elif [ "$DRIFT_COUNT" = "0" ]; then
            echo "✅ no drift, no existing issue — nothing to do."
          else
            gh issue create --title "$TITLE" --label sync-drift --body-file /tmp/issue-body.md
            echo "🆕 opened new sync-drift issue"
          fi
