#
# task.0349 — After Flight Preview **dispatched** promote-and-deploy for a
# merge to main, refresh `main:infra/k8s/overlays/preview/**` digest pins in a
# single commit (`chore(preview): …`). **Does not run** for queue-only Flight
# Preview runs (preview lease locked) — no bot commits for those merges.
#
# Security (workflow_run): never checkout `workflow_run.head_sha` directly
# with contents:write. A read-only job downloads the prior run's artifact; the
# privileged job checks out `main` first, verifies `head_sha` is on main, then
# checks out that commit (CodeQL "untrusted checkout" pattern).
#
# See docs/spec/ci-cd.md.

name: Promote Preview Digest Seed

on:
  workflow_run:
    workflows: ["Flight Preview"]
    types: [completed]

# Default deny; each job sets least privilege.
permissions: {}

concurrency:
  group: promote-preview-seed-main
  cancel-in-progress: false

jobs:
  decide-dispatch:
    name: Digest seed gate (dispatched only)
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    permissions:
      actions: read
    outputs:
      should_seed: ${{ steps.read.outputs.should_seed }}
      merge_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Download Flight Preview outcome artifact
        id: dl
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: preview-flight-outcome
          path: flight-outcome
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - id: read
        name: Interpret flight outcome
        run: |
          set -euo pipefail
          f="flight-outcome/preview-flight-outcome.txt"
          if [ ! -f "$f" ]; then
            echo "should_seed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No preview-flight-outcome artifact (older Flight Preview or skipped job) — skip digest seed"
            exit 0
          fi
          v=$(tr -d '[:space:]' < "$f")
          if [ "$v" = "dispatched" ]; then
            echo "should_seed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Flight outcome=dispatched — digest seed may run"
          else
            echo "should_seed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Flight outcome=${v} — skip digest seed (queue-only or error)"
          fi

  seed:
    name: Refresh preview digest seed on main
    needs: [decide-dispatch]
    if: needs.decide-dispatch.outputs.should_seed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      MERGE_SHA: ${{ needs.decide-dispatch.outputs.merge_sha }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Verify merge SHA is on main before privileged checkout
        run: |
          set -euo pipefail
          sha="${MERGE_SHA:?MERGE_SHA missing}"
          git fetch origin main --quiet
          if ! git rev-parse -q --verify "${sha}^{commit}" >/dev/null 2>&1; then
            echo "::error::workflow_run.head_sha is not a valid commit — refusing checkout"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::workflow_run.head_sha $sha is not reachable from origin/main — refusing privileged checkout (untrusted ref)"
            exit 1
          fi
          git checkout "$sha"
          echo "✅ Checked out verified-on-main SHA ${sha:0:12}"

      - name: Gate maintenance commits and main drift
        id: gate
        run: |
          set -euo pipefail
          msg=$(git log -1 --format=%s "$MERGE_SHA")
          if [[ "$msg" == chore\(deps\):\ argocd-image-updater* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skip: Image Updater maintenance commit"
            exit 0
          fi
          if [[ "$msg" == chore\(preview\):* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skip: digest-seed maintenance commit"
            exit 0
          fi
          git fetch origin main --quiet
          tip=$(git rev-parse origin/main)
          if [ "$tip" != "$MERGE_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Skip: origin/main ($tip) advanced past merge $MERGE_SHA — another merge won the race"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✅ Gate passed for merge ${MERGE_SHA:0:12}"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.gate.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh preview digest seed on main
        if: steps.gate.outputs.skip != 'true'
        run: bash scripts/ci/promote-preview-seed-main.sh

      - name: Commit and push if changed
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          if [ "$(git rev-parse origin/main)" != "$MERGE_SHA" ]; then
            echo "::warning::origin/main advanced before commit — discarding working tree changes"
            git checkout -- infra/k8s/overlays/preview/
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/preview/
          if git diff --cached --quiet; then
            echo "ℹ️  No overlay diff — nothing to push"
            exit 0
          fi
          short=$(echo "$MERGE_SHA" | cut -c1-8)
          git commit -m "chore(preview): refresh digest seed ${short}" -m "task.0349 — after Flight Preview **dispatched** preview for merge ${MERGE_SHA}. Updates main overlay seeds for future promote-and-deploy rsyncs (INFRA_K8S_MAIN_DERIVED)."
          git fetch origin main --quiet
          if [ "$(git rev-parse origin/main)" != "$MERGE_SHA" ]; then
            echo "::warning::origin/main moved after commit — aborting push (reset locally)"
            git reset --hard HEAD~1
            exit 0
          fi
          git push origin HEAD:main
