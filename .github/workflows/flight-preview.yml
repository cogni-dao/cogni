name: Flight Preview

# Triggered on every push to main (PR merged) or via workflow_dispatch(sha).
# Re-tags mq-{N}-{queueSHA} → preview-{mainSHA} in GHCR (no rebuild) and then
# calls scripts/ci/flight-preview.sh, which dispatches promote-and-deploy
# env=preview for the merged SHA. Preview tracks the latest merged SHA
# (latest-wins); there is no review lease/hold.
#
# SHA resolution: HEAD_SHA is the commit on main (github.sha for push events,
# inputs.sha for dispatch). With merge queue enabled, the squash-merged commit
# on main equals the queue commit Y that pr-build (merge_group) built, so
# HEAD_SHA = Y and the merge_group's rebuilt image is at mq-{N}-{HEAD_SHA}.
# We use that tag for source lookup and HEAD_SHA as the destination preview-{}
# tag, the source_sha to promote-and-deploy, and the BUILD_SHA assertion.
#
# bug.0412 changed this from pr-{N}-{prHeadSHA} to mq-{N}-{HEAD_SHA}: the old
# pattern collided with candidate-flight, which also consumes pr-{N}-{X}.
# pr-build now keeps pull_request tags immutable; flight-preview owns the
# mq-{N}-{Y} namespace exclusively.
#
# Direct pushes to main (no associated PR) are NOT a supported flight trigger:
# the re-tag source images are pr-build outputs, and a direct push has no PR
# number. Such pushes exit 0 with a message and do nothing.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Merged commit SHA (must be reachable from origin/main)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: read
  actions: write

# Serialize flight dispatch: two merges landing within seconds run back-to-back,
# not in parallel, so they dispatch promote-and-deploy in merge order.
# promote-and-deploy.yml's own per-env concurrency group then serializes the
# deploys themselves (latest-wins) — there is no review lease.
concurrency:
  group: flight-preview
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cogni-template

jobs:
  flight:
    runs-on: ubuntu-latest
    # Skip flights for maintenance commits on main that carry no merged PR
    # (PR-resolution below would fail loudly). Prefix-keyed, not author-keyed:
    # - chore(deps): argocd-image-updater — bug.0344 Image Updater write-back
    # - chore(preview): — task.0349 digest-seed on main after Flight Preview
    if: |
      github.event_name != 'push' ||
      (!startsWith(github.event.head_commit.message, 'chore(deps): argocd-image-updater') &&
       !startsWith(github.event.head_commit.message, 'chore(preview):'))
    outputs:
      # Emitted by scripts/ci/flight-preview.sh into $GITHUB_OUTPUT.
      # Values: dispatched | (empty when the flight step was gated off,
      # e.g. workflow_dispatch with a non-PR SHA).
      # Consumed by the deploy-preview job to confirm a dispatch occurred.
      status: ${{ steps.flight.outputs.status }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      # Clickable URL of the promote-and-deploy run this flight spawned, resolved
      # by flight-preview.sh (best-effort; may be empty if resolution timed out).
      spawned_run_url: ${{ steps.flight.outputs.spawned_run_url }}
    steps:
      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          # Shallow is enough: the workflow_dispatch path does its own
          # `git fetch origin main --depth=100` before the ancestor check.
          fetch-depth: 1

      - name: Resolve target SHA and associated PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ inputs.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            HEAD_SHA="$DISPATCH_SHA"
            # Ancestor check: refuse to flight a SHA not on main.
            git fetch origin main --depth=100 >/dev/null
            if ! git merge-base --is-ancestor "$HEAD_SHA" origin/main 2>/dev/null; then
              echo "❌ SHA $HEAD_SHA is not reachable from origin/main — refusing to flight"
              exit 1
            fi
          else
            HEAD_SHA="$PUSH_SHA"
          fi

          # Primary resolution: parse `(#NNN)` from the commit subject. GitHub's
          # merge-commit and squash-merge titles always end with this suffix,
          # and reading it from local git is instant and not subject to the
          # commits/{sha}/pulls API's post-merge indexing lag — which silently
          # skipped every auto-flight in the 2026-04-18 incident window (see
          # work/items/bug.0320.flight-preview-pr-lookup-race.md).
          SUBJECT=$(git log -1 --format=%s "$HEAD_SHA" 2>/dev/null || echo "")
          PR_NUMBER=$(printf '%s' "$SUBJECT" | sed -nE 's/.*\(#([0-9]+)\)[[:space:]]*$/\1/p')

          # Fallback: retry the API a few times for the rare case the title
          # doesn't carry the suffix (e.g., human-edited merge commits).
          if [ -z "$PR_NUMBER" ]; then
            for i in 1 2 3 4 5; do
              PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
                --jq '.[0].number // empty' 2>/dev/null || true)
              [ -n "$PR_NUMBER" ] && break
              echo "  commits/${HEAD_SHA:0:8}/pulls empty (attempt $i/5); retry in 3s..."
              sleep 3
            done
          fi

          if [ -z "$PR_NUMBER" ]; then
            if [ "$EVENT_NAME" = "push" ]; then
              echo "::error::flight-preview triggered by push to main but no PR resolvable for ${HEAD_SHA:0:8} after primary (commit subject) + fallback (API 5×3s) lookups. Direct pushes to main are incident-only per docs/spec/ci-cd.md. If this push is intentional, dispatch flight-preview.yml manually with an explicit sha input after the commit you want flighted is on main."
              exit 1
            fi
            # workflow_dispatch with a non-PR SHA. Skip cleanly either way, but a
            # HUMAN-typed dispatch that resolves no PR is operator error — make it
            # LOUD (bug.5050) so a green-no-op run can't be mistaken for a deploy.
            # (A push-triggered skip is a legitimate quiet incident-path and is
            # handled above; this branch only fires for workflow_dispatch.)
            echo "::warning::flight-preview dispatched with SHA ${HEAD_SHA:0:8} that resolves to NO PR — promote-and-deploy was NOT dispatched. This run did nothing. Re-dispatch with a PR-merge SHA."
            {
              echo "## ⚠️ Flight Preview — no-op (nothing deployed)"
              echo ""
              echo "Dispatched with SHA \`${HEAD_SHA}\` that resolves to **NO PR** — \`promote-and-deploy\` was **NOT** dispatched."
              echo ""
              echo "This is almost certainly operator error: a manual \`workflow_dispatch\` must target a PR-merge SHA on main. Re-dispatch with a PR-merge SHA."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # bug.0412 — pr-build.yml emits two distinct GHCR tag namespaces:
          # `pr-{N}-{X}` for pull_request builds (immutable, candidate-flight
          # consumes), and `mq-{N}-{Y}` for merge_group rebuilds where Y is
          # the queue/rebased commit. With merge queue enabled, the squash-
          # merged commit on main equals the queue commit — i.e. HEAD_SHA = Y —
          # so the merge_group's rebuilt image is at `mq-{N}-{HEAD_SHA}`.
          # That image carries the rebased tree's BUILD_SHA, which is what
          # preview should reflect.
          #
          # PR_HEAD_SHA (the original PR branch head) is still recorded for
          # logging / artifact provenance only; it is NOT the image lookup key.
          PR_HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "❌ Failed to resolve head SHA for PR #${PR_NUMBER}"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=mq-${PR_NUMBER}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Merged PR #${PR_NUMBER}: main SHA ${HEAD_SHA:0:8} (= queue commit), PR head SHA ${PR_HEAD_SHA:0:8}"

      - name: Fetch merged PR changed-paths
        id: pr-files
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          OUT: ${{ runner.temp }}/preview-pr-changed-paths.txt
        run: |
          set -euo pipefail
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"

      - name: Detect remote-source artifact targets
        id: remote-source-artifact-targets
        if: steps.pr.outputs.skip != 'true'
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
          OUTPUT_FILE: ${{ runner.temp }}/remote-source-artifact-targets.json
        run: bash scripts/ci/detect-remote-source-artifact-targets.sh

      - name: Set up Docker Buildx
        if: steps.pr.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.pr.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        if: steps.pr.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ steps.pr.outputs.image_tag }}
          REMOTE_SOURCE_ARTIFACT_TARGETS_FILE: ${{ steps.remote-source-artifact-targets.outputs.targets_file }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash scripts/ci/resolve-pr-build-images.sh

      - name: Hard-fail when no images found for resolved PR
        if: steps.pr.outputs.skip != 'true' && steps.images.outputs.has_images != 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          echo "::error::flight-preview resolved PR #${PR_NUMBER} (sha ${HEAD_SHA:0:8}) but no deployable artifact images exist in GHCR. For parent-built artifacts, ensure merge_queue produced mq-${PR_NUMBER}-${HEAD_SHA}. For remote-source artifacts, ensure image_repository:sha-<sourceSha> exists for the accepted gitlink pin."
          exit 1

      # Re-tag only the images that were actually built (affected-only CI may skip services).
      # promote-and-deploy resolves preview-{sha} tags — this creates them without rebuilding.
      # Source tag is mq-{N}-{HEAD_SHA} (pr-build merge_group output, bug.0412);
      # destination is preview-{HEAD_SHA} so promote-and-deploy can look it up.
      - name: Re-tag merge_group images as preview-{sha} in GHCR
        if: steps.pr.outputs.skip != 'true' && steps.images.outputs.has_images == 'true'
        env:
          PR_IMAGE_TAG: ${{ steps.pr.outputs.image_tag }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          RESOLVED_TARGETS: ${{ steps.images.outputs.resolved_targets }}
        run: |
          # Canonical target catalog + tag-suffix + GHCR-package mapping
          # (bug.0328 + bug.0344). Iterating ALL_TARGETS means adding a new
          # node is a one-line edit in scripts/ci/lib/image-tags.sh — no
          # inline list to drift here (root cause of PR #923). image_name_for_target
          # picks the APP vs MIGRATOR GHCR package per target (bug.0344
          # GHCR split — gives the image updater's app/migrator aliases
          # independent Status.Summary.Images entries).
          # shellcheck source=../../scripts/ci/lib/image-tags.sh
          . scripts/ci/lib/image-tags.sh

          PREVIEW_TAG="preview-${HEAD_SHA}"

          for target in "${ALL_TARGETS[@]}"; do
            if is_remote_source_artifact_target "$target"; then
              echo "Skipping ${target} — remote-source artifact resolves by image_repository:sha-<sourceSha>"
              continue
            fi
            # type:infra (e.g. litellm) deploys via Compose-on-VM, not k8s/Argo,
            # so there is no preview-{sha} tag to mint — deploy-infra resolves the
            # content-hash tag directly. resolve-pr-build-images.sh DOES resolve
            # infra (via infra_image_tag), so it lands in RESOLVED_TARGETS; the
            # naive mq-{N}-{sha}{suffix} src below never exists for it. Skip here,
            # mirroring promote-build-payload.sh's is_infra_target guard.
            if is_infra_target "$target"; then
              echo "Skipping ${target} — infra image (Compose-deployed, no k8s preview tag)"
              continue
            fi
            if ! echo "$RESOLVED_TARGETS" | grep -qw "$target"; then
              echo "Skipping ${target} — not in PR build (not affected or not built)"
              continue
            fi
            suffix=$(tag_suffix_for_target "$target")
            image_name=$(image_name_for_target "$target")
            src="${image_name}:${PR_IMAGE_TAG}${suffix}"
            dst="${image_name}:${PREVIEW_TAG}${suffix}"
            echo "Re-tagging ${target}: ${image_name##*/}:${PR_IMAGE_TAG}${suffix} → ${PREVIEW_TAG}${suffix}"
            docker buildx imagetools create --tag "$dst" "$src"
          done

          echo "✅ Re-tag complete for preview-${HEAD_SHA:0:8}"

      # The script writes `status=dispatched` to $GITHUB_OUTPUT and a markdown
      # banner to $GITHUB_STEP_SUMMARY — no decision logic lives in this
      # workflow. Exit 0 = dispatched, 1 = error.
      - name: Flight to preview
        id: flight
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          # bug.0412 — pr-build (merge_group) bakes BUILD_SHA = queue commit
          # = HEAD_SHA into the image, NOT the original PR head SHA. The
          # source-sha-by-app map and verify-buildsha both assert against
          # /version.buildSha, so build_sha here MUST equal HEAD_SHA.
          BUILD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
          # task.0376: scope promote-and-deploy.yml's matrix to affected
          # targets (RESOLVED_TARGETS is space-delimited; convert to CSV).
          RESOLVED_TARGETS: ${{ steps.images.outputs.resolved_targets }}
        run: |
          NODES_CSV=$(echo "${RESOLVED_TARGETS}" | tr ' ' ',' | sed 's/^,//;s/,$//')
          bash scripts/ci/flight-preview.sh \
            "$HEAD_SHA" \
            "$REPOSITORY" \
            "deploy/preview" \
            "$GH_TOKEN" \
            "$BUILD_SHA" \
            "$NODES_CSV"
        continue-on-error: true

      - name: Propagate flight failure
        if: steps.flight.outcome == 'failure' && steps.flight.outputs.status == ''
        run: |
          echo "::error::flight-preview.sh exited non-zero without emitting a status — check the Flight step log."
          exit 1

      # Consumed by promote-preview-digest-seed.yml (workflow_run). Only
      # `dispatched` may trigger a chore(preview): commit on main.
      - name: Record preview flight outcome artifact
        if: always() && steps.pr.outputs.skip != 'true'
        run: |
          status="${{ steps.flight.outputs.status }}"
          printf '%s\n' "${status:-unknown}" > preview-flight-outcome.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always() && steps.pr.outputs.skip != 'true'
        with:
          name: preview-flight-outcome
          path: preview-flight-outcome.txt

  # Visible check: green when promote-and-deploy was dispatched for this merge.
  # Skipped (grey) only when the flight was gated off (a non-PR dispatch SHA).
  preview-dispatched-marker:
    needs: flight
    if: success() && needs.flight.outputs.status == 'dispatched'
    runs-on: ubuntu-latest
    steps:
      - name: Preview flight dispatched
        run: |
          echo "✅ Preview lease was unlocked; promote-and-deploy was dispatched for this merge."

  # Deploy-preview is gated on the flight script's `status` output, not on
  # step conclusions. A dispatched run emits `status=dispatched` and this job
  # runs to confirm; a gated-off run (non-PR dispatch SHA) leaves it skipped.
  deploy-preview:
    needs: flight
    if: needs.flight.outputs.status == 'dispatched'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm dispatched deploy
        env:
          PR_NUMBER: ${{ needs.flight.outputs.pr_number }}
          HEAD_SHA: ${{ needs.flight.outputs.head_sha }}
          SPAWNED_RUN_URL: ${{ needs.flight.outputs.spawned_run_url }}
        run: |
          echo "✅ promote-and-deploy dispatched for PR #${PR_NUMBER} (${HEAD_SHA:0:8})."
          if [ -n "${SPAWNED_RUN_URL}" ]; then
            echo "🔗 Spawned run: ${SPAWNED_RUN_URL}"
          else
            echo "Watch: gh run list --workflow=promote-and-deploy.yml --limit 1"
          fi
