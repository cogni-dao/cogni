# LiteLLM Proxy Configuration
# Purpose: Model routing configuration for LiteLLM proxy.
# Scope: Defines model aliases, provider routing, and database settings.
#
# PROVIDER: Hyperbolic ONLY (clean cut, no OpenRouter fallback).
#   Every route below maps to a model Hyperbolic ACTUALLY serves, verified
#   against `GET https://api.hyperbolic.xyz/v1/models` (2026-06-25). The full
#   served list is exactly these 5 chat models — there is no pagination, no
#   embeddings endpoint, and no proprietary (GPT/Claude/Gemini/Grok) models.
#
#   Served models (id · supports_tools · supports_image_input · ctx):
#     deepseek-ai/DeepSeek-V3-0324           · tools:false · image:false · 163840
#     meta-llama/Llama-3.3-70B-Instruct      · tools:false · image:false · 131072
#     deepseek-ai/DeepSeek-R1                 · tools:false · image:false · 163840
#     deepseek-ai/DeepSeek-R1-0528            · tools:false · image:false · 163840
#     Qwen/Qwen3-Coder-480B-A35B-Instruct     · tools:TRUE  · image:false · 262144
#
#   TOOL USE: only Qwen3-Coder-480B advertises native tools. The agent/ReAct
#   default (tool-calling graphs) MUST point at `qwen3-coder` (tagged
#   default_tools below). The other 4 are text/reasoning only.
#
#   NO EMBEDDINGS: Hyperbolic has no embeddings endpoint. `text-embedding-3-small`
#   was REMOVED. OpenClaw memory_search (semantic vector search) has NO embeddings
#   route until a separate embeddings provider is chosen (self-hosted BGE, etc.).
#   See PR body "EMBEDDINGS — REQUIRED SEPARATE DECISION".
#
# ⚠️ DO-NOT-PROMOTE-UNTIL-KEY-SET: every route here 401s in any env that lacks
#    HYPERBOLIC_API_KEY. Merging this file is safe (catalog entry is
#    required:false), but PROMOTING it to an env requires that env's
#    HYPERBOLIC_API_KEY set FIRST. See infra/secrets-catalog.yaml.
#
# Link: https://docs.litellm.ai/docs/providers/hyperbolic

model_list:
  # ===== FREE / DEFAULT =====
  # Smallest Hyperbolic chat model -> designated default_free for cost control.
  # (gpt-4o-mini was the previous default_free; dropped — proprietary, not on Hyperbolic.)
  - model_name: llama-3.3-70b
    litellm_params:
      model: hyperbolic/meta-llama/Llama-3.3-70B-Instruct
      api_key: "os.environ/HYPERBOLIC_API_KEY"
    model_info:
      display_name: "Llama 3.3 70B"
      is_free: true
      provider_key: "meta"
      metadata:
        cogni:
          default_free: true
          default_flash: true

  # ===== PAID MODELS =====
  # DeepSeek V3 (general chat / coding, no native tools)
  - model_name: deepseek-v3
    litellm_params:
      model: hyperbolic/deepseek-ai/DeepSeek-V3-0324
      api_key: "os.environ/HYPERBOLIC_API_KEY"
    model_info:
      display_name: "DeepSeek V3 (0324)"
      is_free: false
      provider_key: "deepseek"

  # DeepSeek R1 (reasoning)
  - model_name: deepseek-r1
    litellm_params:
      model: hyperbolic/deepseek-ai/DeepSeek-R1
      api_key: "os.environ/HYPERBOLIC_API_KEY"
    model_info:
      display_name: "DeepSeek R1"
      is_free: false
      provider_key: "deepseek"

  # DeepSeek R1 (0528 refresh) — designated thinking default
  - model_name: deepseek-r1-0528
    litellm_params:
      model: hyperbolic/deepseek-ai/DeepSeek-R1-0528
      api_key: "os.environ/HYPERBOLIC_API_KEY"
    model_info:
      display_name: "DeepSeek R1 (0528)"
      is_free: false
      provider_key: "deepseek"
      metadata:
        cogni:
          default_thinking: true

  # Qwen3-Coder 480B — the ONLY Hyperbolic model with native tool support.
  # Agent / ReAct / tool-calling graphs MUST default here (default_tools).
  - model_name: qwen3-coder
    litellm_params:
      model: hyperbolic/Qwen/Qwen3-Coder-480B-A35B-Instruct
      api_key: "os.environ/HYPERBOLIC_API_KEY"
    model_info:
      display_name: "Qwen3 Coder 480B"
      is_free: false
      provider_key: "qwen"
      metadata:
        cogni:
          default_tools: true

litellm_settings:
  drop_params: true
  include_cost_in_streaming_usage: true
  # Per-node billing routing via custom callback (replaces generic_api).
  # See: infra/images/litellm/cogni_callbacks.py, docs/spec/multi-node-tenancy.md
  callbacks: cogni_callbacks.cogni_node_router
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/LITELLM_DATABASE_URL"
  database_type: "postgres"
