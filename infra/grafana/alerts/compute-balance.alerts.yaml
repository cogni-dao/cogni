# Grafana unified-alerting provisioning — compute-substrate spend plane (story.5011).
#
# WHY: On 2026-06-19 all of preview went down when its Cherry VM was balance-suspended.
# The deploy state in git was clean; nothing alerted. The operator now exposes balance as
# a provider-agnostic Prometheus gauge; these rules make a low (or unknown) balance loud
# BEFORE a suspension takes an environment down.
#
# SOURCE METRIC: `compute_balance_remaining{provider,account,currency}` — a prom-client gauge
# set on each on-demand read of GET /api/v1/compute/balances, scraped via /api/metrics -> Mimir.
#
# ⚠️ FRESHNESS: the gauge refreshes only when the balance is read (dashboard load / API call).
# Reliable unattended firing requires a periodic refresh (a lightweight gauge-setter, NOT the
# retired Loki scheduled-job anti-pattern) — deferred. The `absent` rule below surfaces that gap.
#
# APPLY: Grafana Git Sync does not sync alerting (see ./README.md). Apply via the alerting
# provisioning API or Terraform. Replace <FOLDER_UID>; confirm a contact point on the
# notification policy. `grafanacloud-prom` is the Mimir/Prometheus datasource UID (confirm
# at apply — webhook-plane.alerts.yaml uses `grafanacloud-logs` for Loki). Delivery to a
# GitHub issue is a contact point (webhook receiver), not wired here — separate apply-time concern.
apiVersion: 1
groups:
  - orgId: 1
    folder: <FOLDER_UID>
    name: compute-balance-plane
    interval: 5m
    rules:
      # PRIMARY: a provider account is below the low-balance threshold (EUR major units).
      - uid: compute-balance-low
        title: Compute provider balance LOW — top up before suspension
        condition: THRESHOLD
        for: 5m
        data:
          - refId: BAL
            datasourceUid: grafanacloud-prom
            relativeTimeRange: { from: 600, to: 0 }
            model:
              datasource: { type: prometheus, uid: grafanacloud-prom }
              expr: 'min(compute_balance_remaining{env="production"})'
              instant: true
              refId: BAL
          - refId: THRESHOLD
            datasourceUid: __expr__
            model:
              type: threshold
              expression: BAL
              conditions:
                - evaluator: { type: lt, params: [50] }
              refId: THRESHOLD
        annotations:
          summary: "A compute provider account is below 50 (currency major units). Top up now — a balance suspension takes the env's VM (and every node on it) down (story.5011)."
        labels: { severity: critical, plane: compute-balance }
        noDataState: NoData
        execErrState: Alerting

      # SECONDARY: balance is UNKNOWN — gauge not refreshed in 2h (no read happened).
      # Honest surfacing of the on-demand-only freshness gap until a periodic refresh lands.
      - uid: compute-balance-stale
        title: Compute balance UNKNOWN — no fresh reading in 2h
        condition: ABSENT
        for: 10m
        data:
          - refId: ABSENT
            datasourceUid: grafanacloud-prom
            relativeTimeRange: { from: 7200, to: 0 }
            model:
              datasource: { type: prometheus, uid: grafanacloud-prom }
              expr: 'absent_over_time(compute_balance_remaining{env="production"}[2h])'
              instant: true
              refId: ABSENT
        annotations:
          summary: "No fresh compute-balance reading in 2h — balance awareness is blind. Exercise GET /api/v1/compute/balances or add a periodic gauge refresh."
        labels: { severity: warning, plane: compute-balance }
        noDataState: Alerting
        execErrState: Alerting
