#
# Argo CD non-HA install for single-node k3s with ksops secret decryption.
# Applied during cluster bootstrap, not by Argo itself.
#
# Usage:
#   kubectl create namespace argocd
#   kubectl kustomize infra/k8s/argocd/ | kubectl apply -n argocd -f -
#
# Pin to a specific release for reproducibility:
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pin to Argo CD v2.13 (latest stable as of 2026-03).
  # Non-HA is appropriate for single-node k3s crawl; HA is a P2 concern.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.4/manifests/install.yaml
  # ksops CMP plugin ConfigMap
  - ksops-cmp.yaml
  # PER-ENV app-of-apps: each continuously reconciles the per-node ApplicationSets
  # under appsets/<env>/ with prune, so a catalog-removed node's AppSet is auto-pruned.
  # All three are listed here for drift/completeness (mirroring how the per-(env, node)
  # AppSets were once all listed), BUT each env's CLUSTER must only get ITS OWN
  # app-of-apps — a single cluster running all three would fan every env's AppSets
  # onto it. provision-env-vm.sh therefore applies only cogni-${DEPLOY_ENV}-appsets.
  # candidate-b is provisioned separately (provision-env.yml) and not included.
  - candidate-a-appsets-application.yaml
  - preview-appsets-application.yaml
  - production-appsets-application.yaml

patches:
  # Add ksops sidecar to repo-server for SOPS/age secret decryption
  - path: repo-server-patch.yaml
  # 30s reconciliation for fast dev iteration (default is 180s)
  - path: argocd-cm-patch.yaml
