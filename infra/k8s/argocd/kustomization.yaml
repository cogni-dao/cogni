#
# Argo CD non-HA install for single-node k3s with ksops secret decryption.
# Applied during cluster bootstrap, not by Argo itself.
#
# Usage:
#   kubectl create namespace argocd
#   kubectl kustomize infra/k8s/argocd/ | kubectl apply -n argocd -f -
#
# Pin to a specific release for reproducibility:
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pin to Argo CD v2.13 (latest stable as of 2026-03).
  # Non-HA is appropriate for single-node k3s crawl; HA is a P2 concern.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.4/manifests/install.yaml
  # ksops CMP plugin ConfigMap
  - ksops-cmp.yaml
  #
  # NOTE: the per-env app-of-apps (cogni-<env>-appsets) are NO LONGER listed here.
  # They moved under control-plane/<env>/ and are now reconciled by a per-env ROOT
  # app-of-apps (control-plane/roots/<env>-control-plane-application.yaml, story.5020).
  # provision applies ONLY the matching cogni-${DEPLOY_ENV}-control-plane seed — the
  # one apply-once surface — and Argo owns the app-of-apps layer from there. They are
  # deliberately NOT bootstrap-listed for the SAME per-env-scoping reason that kept them
  # out of a shared source before: a single cluster rendering all three would fan every
  # env's app-of-apps (and pods) onto it. This bootstrap kustomization now installs ONLY
  # Argo itself (install + ksops + patches) — the self-managed control-plane boundary the
  # roots must never cross. candidate-b is provisioned separately (provision-env.yml).

patches:
  # Add ksops sidecar to repo-server for SOPS/age secret decryption
  - path: repo-server-patch.yaml
  # 30s reconciliation for fast dev iteration (default is 180s)
  - path: argocd-cm-patch.yaml
