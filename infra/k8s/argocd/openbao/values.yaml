#
# OpenBao Helm values for single-node k3s Tier-1 substrate (task.0284).
# Documented intent for every non-default key. Defaults that match our needs
# are NOT restated here — read the chart's values.yaml at the pinned version
# for the full surface.

global:
  enabled: true

# Disabled — we use the external-secrets ESO controller (separate Argo App)
# for secret syncing. The OpenBao chart's built-in CSI driver is a different
# pattern we explicitly reject (per-pod volume vs. native k8s Secret consumption).
csi:
  enabled: false

# Disabled — agent injector is the alternative to ESO's pull model; we picked
# ESO. Two patterns are confusing; keep one. Per task.0284 design rejection.
injector:
  enabled: false

server:
  # Single-node k3s. HA is a P2 concern (Crawl row 4+ multi-node clusters).
  ha:
    enabled: false
  standalone:
    enabled: true
    # Storage: integrated Raft. Persistent volume below.
    # Listener: plain TCP on 8200; in-cluster only (no Ingress in v0).
    # cert-manager integration is task.5054.
    config: |
      ui = true
      listener "tcp" {
        tls_disable     = 1
        address         = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path    = "/openbao/data"
        node_id = "openbao-0"
      }
      service_registration "kubernetes" {}

      # AWS KMS auto-unseal (bug.5011 / bug.5051; access-control-charter.md
      # CC6.1). The `seal` stanza is an OpenBao-native OSS feature — no sidecar,
      # no custom unseal script. With it present, OpenBao wraps its master key
      # with the KMS key and calls kms:Decrypt on EVERY pod start to unwrap and
      # auto-unseal itself. A restart (OOM / reboot / chart bump / `kubectl
      # delete pod`) no longer reseals → the recurring days-long secret-plane
      # outage (preview+prod, 2026-06-20+) becomes structurally impossible.
      #
      # Root-of-trust is OFF the k3s node by design. The OSS-native seals were
      # evaluated and rejected for THIS single-node bare-metal stack:
      #   - seal "transit": relocates the manual-unseal SPOF to a second OpenBao
      #     that itself must be unsealed (turtles), and doubles Raft/PVC surface
      #     on a box that already OOMKills the first vault.
      #   - seal "pkcs11" + SoftHSM: token DB + PIN live on the same node =
      #     key-next-to-lock, the pattern bug.5011 explicitly REJECTED (SOC2
      #     CC6.1). A real HSM needs hardware Cherry doesn't offer.
      # Full comparison: PR body + infra/provision/aws-kms/main.tf.
      #
      # The stanza is intentionally EMPTY of values. Both the key id and the
      # AWS credential are sourced from environment (the OpenBao-native env
      # fallback for `seal "awskms"`), so NOTHING about the key or the
      # credential is committed to git (Invariant 4) and NOTHING needs deploy-
      # branch templating. Env wiring is `extraSecretEnvironmentVars` below:
      #   VAULT_AWSKMS_SEAL_KEY_ID → kms_key_id   (non-secret identifier)
      #   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY → seal principal credential
      #   AWS_REGION → key region
      # (OpenBao keeps the VAULT_-prefixed env name for Vault compatibility.)
      seal "awskms" {}

  # Seal-backend env → StatefulSet container. Every value comes from a pre-
  # seeded k8s Secret (`openbao-seal-aws`), never a literal here, so NO secret
  # byte and not even the key id lives in git. The Secret is created ONCE per
  # env at provision time (provision-env-vm.sh Phase 5b) from the
  # infra/provision/aws-kms/ outputs. This credential is the seal-backend
  # bootstrap secret — the one thing that cannot live in OpenBao because it is
  # what unseals OpenBao (the Shamir-key analogue). If the Secret is absent the
  # pod fails to start LOUDLY (missing secretKeyRef) rather than silently
  # falling back to Shamir.
  extraSecretEnvironmentVars:
    - envName: VAULT_AWSKMS_SEAL_KEY_ID
      secretName: openbao-seal-aws
      secretKey: VAULT_AWSKMS_SEAL_KEY_ID
    - envName: AWS_ACCESS_KEY_ID
      secretName: openbao-seal-aws
      secretKey: AWS_ACCESS_KEY_ID
    - envName: AWS_SECRET_ACCESS_KEY
      secretName: openbao-seal-aws
      secretKey: AWS_SECRET_ACCESS_KEY
    - envName: AWS_REGION
      secretName: openbao-seal-aws
      secretKey: AWS_REGION

  dataStorage:
    enabled: true
    size: 10Gi
    # storageClass: omitted — defaults to cluster default (local-path on k3s).

  # bug.5011: the 512Mi limit OOMKilled prod OpenBao (2026-06-11 02:25) on the
  # memory-tight 6GB box → Shamir reseal → ESO/secrets outage until manual
  # unseal. Raised headroom so a Raft vault under load isn't container-OOMKilled;
  # the larger request also reserves it honestly so node pressure can't squeeze
  # it. NOTE: this mitigates the OOM *trigger* only — the durable fix for the
  # reseal-on-restart SPOF (any reboot/update reseals a Shamir 1-of-1 vault) is
  # auto-unseal, tracked in bug.5011.
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      memory: 1Gi

  # Readiness/liveness use OpenBao's /v1/sys/health endpoint. Sealed pods
  # return 503 by default; the chart's standby/sealed code mappings already
  # treat sealed-but-running as "alive" so it doesn't crash-loop pre-unseal.

  # Kubernetes auth method config is applied by `provision-env-vm.sh`
  # Phase 5b.3 (auto-init + auto-bind eso-reader) after init/unseal. It is
  # NOT configured here because it depends on cluster-issued ServiceAccount
  # tokens that don't exist at chart-render time.

ui:
  enabled: true
  serviceType: ClusterIP
