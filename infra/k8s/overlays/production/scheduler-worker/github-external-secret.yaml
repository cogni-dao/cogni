#
# Attribution-ledger GitHub poll source needs the operator's GitHub App creds.
# The scheduler-worker's ledger container builds the `github` poll adapter only
# when GH_REVIEW_APP_ID + GH_REVIEW_APP_PRIVATE_KEY_BASE64 (+ GH_REPOS, in the
# configmap) are present; without them it logs `worker.config.source_no_adapter`
# and CollectSourcesWorkflow throws `[SOURCE_NO_ADAPTER]`, blocking epoch
# enrichment/allocation. These two keys already live in OpenBao
# `production/operator` (the same source operator-env-secrets extracts), so we
# pull ONLY those two here — not the whole operator env — to keep blast radius
# minimal and avoid clobbering the worker's own DATABASE_URL/AUTH_SECRET/etc.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scheduler-worker-github-secrets
  namespace: cogni-production
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: scheduler-worker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: scheduler-worker-github-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GH_REVIEW_APP_ID
      remoteRef:
        key: production/operator
        property: GH_REVIEW_APP_ID
    - secretKey: GH_REVIEW_APP_PRIVATE_KEY_BASE64
      remoteRef:
        key: production/operator
        property: GH_REVIEW_APP_PRIVATE_KEY_BASE64
