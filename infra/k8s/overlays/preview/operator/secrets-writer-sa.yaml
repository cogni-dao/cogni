#
# The operator pod's OWN machine identity for node self-serve secret writes
# (design.node-self-serve-secrets §Phase 1.B). namePrefix `operator-` makes the
# final name `operator-secrets-writer`, which the <env>-node-secrets-writer
# OpenBao k8s-auth role binds in the cogni-<env> namespace. The pod self-logins
# with a projected token (audience cogni-openbao) — no SSH, no `kubectl create token`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  labels:
    app.kubernetes.io/part-of: cogni
    app.kubernetes.io/component: operator-secrets-writer
