apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-preview

resources:
  - ../../../base/node-app
  - ../../../base/openfga-external
  - external-secret.yaml
  - ./secrets-writer-sa.yaml

namePrefix: operator-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:cd0eaf8d9e4101a8d2cbf26d47c536ff0b3940c57f65be337aef5d3cc28fce77"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/NODE_NAME
        value: "operator"
      # Deploy-env name the secrets route stamps onto the OpenBao path
      # (cogni/<env>/<node>/<KEY>). Distinct from APP_ENV (a build flag).
      - op: add
        path: /data/DEPLOY_ENVIRONMENT
        value: "preview"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-preview"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://operator-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "operator-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://operator-redis-external:6379"
      - op: add
        path: /data/NEXTAUTH_URL
        value: "https://preview.cognidao.org"
      - op: add
        path: /data/NODE_MINT_OWNER
        value: "cogni-test-org"
      - op: add
        path: /data/NODE_TEMPLATE_OWNER
        value: "cogni-test-org"
      - op: add
        path: /data/DOLTHUB_OWNER
        value: "cogni-test-nodes"
      - op: add
        path: /data/NODE_SUBMODULE_PARENT_OWNER
        value: "cogni-test-org"
      - op: add
        path: /data/NODE_SUBMODULE_PARENT_REPO
        value: "cogni-monorepo"
      - op: add
        path: /data/OPENFGA_API_URL
        value: "http://operator-openfga-external:8080"
      # Node self-serve secret writes — operator's OpenBao writer role (SA +
      # projected token wired on the Deployment below). OPENBAO_ADDR defaults to
      # the in-cluster ClusterIP, so only the role name is set here.
      - op: add
        path: /data/OPENBAO_NODE_SECRETS_WRITER_ROLE
        value: "preview-node-secrets-writer"
  # NodePort assignment (operator = 30000) + instance label on selector.
  # Instance label prevents cross-node service routing: namePrefix only renames
  # resource names, not labels/selectors, so without this every Service
  # round-robins across all node-app pods.
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30000
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "operator"
  # Fix secret refs + instance label on matchLabels and pod template.
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "operator-env-secrets"
      - op: replace
        path: /spec/template/spec/initContainers/0/envFrom/1/secretRef/name
        value: "operator-env-secrets"
      # design.node-self-serve-secrets §1.B: the operator pod's OWN OpenBao
      # identity, bound by the preview-node-secrets-writer k8s-auth role.
      # Projected token carries the cogni-openbao audience. SSA (#1642) keeps
      # this drift-free.
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: secrets-writer
      - op: add
        path: /spec/template/spec/volumes
        value:
          - name: openbao-token
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    audience: cogni-openbao
                    expirationSeconds: 3600
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts
        value:
          - name: openbao-token
            mountPath: /var/run/secrets/openbao
            readOnly: true
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "operator"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "operator"

  # task.0423: Doltgres knowledge-plane migrator runs as a second initContainer
  # on the operator Deployment. DATABASE_URL maps to DOLTGRES_URL.
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: migrate-doltgres
          image: ghcr.io/cogni-dao/cogni-template:placeholder
          command:
            - /bin/sh
            - -c
            - exec node /app/nodes/$(NODE_NAME)/app/migrate-doltgres.mjs /app/nodes/$(NODE_NAME)/app/doltgres-migrations
          envFrom:
            - configMapRef:
                name: operator-node-app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: operator-env-secrets
                  key: DOLTGRES_URL
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

  # bug.0295: VM discovery via DNS (cogni-preview.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: postgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: temporal-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: litellm-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: openfga-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: openfga-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: redis-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: redis-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: doltgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: doltgres-external
      spec:
        type: ExternalName
        externalName: cogni-preview.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: postgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-external-1
  - target: { kind: EndpointSlice, name: temporal-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-external-1
  - target: { kind: EndpointSlice, name: litellm-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: litellm-external-1
  - target: { kind: EndpointSlice, name: redis-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: redis-external-1
  - target: { kind: EndpointSlice, name: doltgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: doltgres-external-1
