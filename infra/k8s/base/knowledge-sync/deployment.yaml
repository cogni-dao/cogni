apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-sync
  labels:
    app.kubernetes.io/name: knowledge-sync
    app.kubernetes.io/part-of: cogni
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-sync
        app.kubernetes.io/part-of: cogni
    spec:
      terminationGracePeriodSeconds: 30
      # Best-effort reconciliation worker. The DoltHub mirror is gated on
      # DOLTHUB_REMOTE_URL (prod-only secret); when absent the pod boots healthy
      # and idles. knowledge-sync-secrets is optional so the pod never blocks on
      # secret propagation (it stays a healthy no-op without it).
      containers:
        - name: knowledge-sync
          image: ghcr.io/cogni-dao/cogni-template:placeholder
          ports:
            - containerPort: 9000
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: knowledge-sync-config
            - secretRef:
                name: knowledge-sync-secrets
                optional: true
          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
