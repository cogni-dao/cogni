#
# Non-secret configuration for scheduler-worker.
# Env-specific values (TEMPORAL_NAMESPACE, IMAGE_DIGEST) are patched by overlays.
# COGNI_NODE_ENDPOINTS is identical across envs (same k8s Service DNS), so it lives here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-worker-config
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
data:
  # Temporal connection — overridden per-env by overlay
  TEMPORAL_ADDRESS: "temporal:7233"
  TEMPORAL_NAMESPACE: "cogni-staging"
  TEMPORAL_TASK_QUEUE: "scheduler-tasks"
  # Per-node API endpoints — identical across envs (k8s Service DNS + port).
  # Each entry maps nodeId/slug to the node's internal Service.
  COGNI_NODE_ENDPOINTS: "ayo=http://ayo-node-app:3000,a133ace7-4ca4-4c41-9e31-6cffa5778987=http://ayo-node-app:3000,canary=http://canary-node-app:3000,89612f02-114d-460d-87a5-c2ab212ccf6f=http://canary-node-app:3000,coulditbe=http://coulditbe-node-app:3000,04bfcc09-1937-4d3d-91a7-12b92947d167=http://coulditbe-node-app:3000,creative=http://creative-node-app:3000,2e04fe04-2155-4d90-8f59-332caab20792=http://creative-node-app:3000,node-template=http://node-template-node-app:3000,b927a9dd-6132-4fc9-a51e-e3cee2568e3c=http://node-template-node-app:3000,operator=http://operator-node-app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://operator-node-app:3000,oss=http://oss-node-app:3000,4d7ffb44-fc26-4a55-864f-eff9fbc8aba1=http://oss-node-app:3000,pandora=http://pandora-node-app:3000,e9a9d765-29c5-4743-a094-e68193932272=http://pandora-node-app:3000,please=http://please-node-app:3000,da8bbc56-96e6-413a-8b45-3a43bfeee6d6=http://please-node-app:3000,resy=http://resy-node-app:3000,f6d2a17d-b7f6-4ad1-a86b-f0ad2380999e=http://resy-node-app:3000"
  # Observability
  LOG_LEVEL: "info"
  SERVICE_NAME: "scheduler-worker"
  HEALTH_PORT: "9000"
  # Image digest — set by overlay on promotion
  IMAGE_DIGEST: "placeholder"
