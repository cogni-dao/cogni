#
# Non-secret configuration for scheduler-worker.
# Env-specific values (TEMPORAL_NAMESPACE, IMAGE_DIGEST) are patched by overlays.
# COGNI_NODE_ENDPOINTS is identical across envs (same k8s Service DNS), so it lives here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-worker-config
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
data:
  # Temporal connection — overridden per-env by overlay
  TEMPORAL_ADDRESS: "temporal:7233"
  TEMPORAL_NAMESPACE: "cogni-staging"
  TEMPORAL_TASK_QUEUE: "scheduler-tasks"
  # Per-node API endpoints — identical across envs (k8s Service DNS + port).
  # Each entry maps nodeId/slug to the node's internal Service.
  COGNI_NODE_ENDPOINTS: "beacon=http://beacon-node-app:3000,f97f68f2-8406-4a3b-b5a9-d579b779f19d=http://beacon-node-app:3000,blue=http://blue-node-app:3000,da3777a6-1f33-463a-a73c-70924806da50=http://blue-node-app:3000,habitat=http://habitat-node-app:3000,dbf1eeb7-85d4-4fd5-a4fe-da85c668bb03=http://habitat-node-app:3000,node-template=http://node-template-node-app:3000,b927a9dd-6132-4fc9-a51e-e3cee2568e3c=http://node-template-node-app:3000,operator=http://operator-node-app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://operator-node-app:3000,oss=http://oss-node-app:3000,4d7ffb44-fc26-4a55-864f-eff9fbc8aba1=http://oss-node-app:3000,red=http://red-node-app:3000,895147d5-2ad9-4b2b-aeaa-f2669999fdce=http://red-node-app:3000"
  # Observability
  LOG_LEVEL: "info"
  SERVICE_NAME: "scheduler-worker"
  HEALTH_PORT: "9000"
  # Image digest — set by overlay on promotion
  IMAGE_DIGEST: "placeholder"
