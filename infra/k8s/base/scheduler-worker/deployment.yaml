apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-worker
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
  annotations:
    # Stakater Reloader: rolling-restart this Deployment when the configmap it
    # reads via `envFrom` changes. COGNI_NODE_ENDPOINTS is injected once, at
    # container start — without this, a newly-flighted node's catalog-projected
    # endpoint never reaches the running worker, so chat/completions hangs until
    # a manual rollout. This is what makes born-green routing actually born-green.
    # See infra/k8s/argocd/reloader/ + infra/k8s/base/node-app/deployment.yaml.
    reloader.stakater.com/auto: "true"
spec:
  # 2 replicas: kill the single-pod SPOF. A scheduler-worker outage previously
  # took the whole public fleet to 502 (2026-06-25) because every node-app
  # readiness depended on it; even with that coupling removed, the worker is
  # shared substrate and must not be a single point of failure. Temporal workers
  # polling the same task queue scale horizontally by design — no leader election
  # needed; schedule lifecycle (create/update/reconcile) lives in the operator
  # app + advisory-locked endpoints, not here, so 2 pollers do not double-fire.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler-worker
        app.kubernetes.io/part-of: cogni
    spec:
      terminationGracePeriodSeconds: 30
      # Per QUEUE_PER_NODE_ISOLATION (task.0280 phase 2): the worker runs one
      # Temporal Worker per node in a single pod. Failure of any single node
      # must NOT keep the worker from starting — it would starve every other
      # node's workflow execution, turning isolated data into coupled liveness.
      # Boot readiness is Temporal-reachability only (the sole hard dep).
      # Per-node HTTP reachability is emitted as a boot-time warn log +
      # Prometheus gauge (scheduler_worker_node_reachable), not gated.
      containers:
        - name: scheduler-worker
          image: ghcr.io/cogni-dao/cogni-template:placeholder
          ports:
            - containerPort: 9000
              name: health
              protocol: TCP
          # startupProbe gives slow boots room before liveness arms. The worker
          # webpack-builds its Temporal workflow bundle at startup (bundleWorkflowCode);
          # under the per-node-queue model that was N serial ~3MB builds → event-loop
          # block → liveness SIGKILL → crashloop → fleet 502 (2026-06-25 incident).
          # 60 × 5s = 300s grace covers the build storm; liveness/readiness stay
          # disabled until the first /livez success. A genuine steady-state hang is
          # still caught fast by the tight livenessProbe below once startup passes.
          startupProbe:
            httpGet:
              path: /livez
              port: health
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: scheduler-worker-secrets
            - configMapRef:
                name: scheduler-worker-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              # Headroom for the startup Temporal workflow-bundle build (webpack).
              # 512Mi/500m starved it under the per-node-queue storm → SIGKILL loop.
              memory: "1Gi"
              cpu: "2"
