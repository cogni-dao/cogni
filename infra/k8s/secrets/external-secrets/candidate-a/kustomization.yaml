#
# Candidate-a environment — aggregator kustomization that includes every
# per-service ExternalSecret directory. Add a new entry here when adding a
# new service to this env. The ClusterSecretStore (cluster-scoped, env-
# independent) lives at the parent dir's kustomization.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # node-template's ExternalSecret lives in node-domain per
  # docs/design/secrets-catalog-per-node.md. The aggregator entry below
  # is mechanical wiring; node engineers add new ExternalSecret dirs
  # under their own nodes/<node>/k8s/external-secrets/<env>/ and update
  # this aggregator in a single operator-domain ride-along edit.
  - ../../../../../nodes/node-template/k8s/external-secrets/candidate-a
  - scheduler-worker
