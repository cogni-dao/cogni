#
# ExternalSecret for operator (the hub node-app) on candidate-b — first real
# pod cutover off the imperative deploy-infra secret-push (task.5094).
#
# Conforms to docs/spec/secrets-management.md Invariant 2 ONE_EXTERNAL_SECRET_
# PER_SERVICE_ENV: exactly one ExternalSecret per (service, env), using
# `dataFrom: extract` to pull every key under cogni/candidate-b/operator into a
# single k8s Secret `operator-env-secrets`, consumed by the operator overlay via
# `envFrom: secretRef` (+ the doltgres migrator's DOLTGRES_URL secretKeyRef).
#
# The OpenBao path is seeded by provision Phase 5c's catalog-gated per-node
# fan-out (reconcile-secrets.sh::seed_node_app_secrets, NODE_BASELINE_KEYS):
# shared values land denormalized in this node's path, so a single per-node
# extract delivers both node-specific and shared keys (design decision A).
#
# Created ONCE at cutover. Adding/removing/rotating individual keys in OpenBao
# does NOT edit this file — see docs/guides/secrets-{add-new,rotate}.md.
#
# TRANSITION_SAFE (Invariant 12): an empty/under-seeded OpenBao path makes ESO
# emit SecretSyncedError and the Pod fail loudly (visible in
# `kubectl describe externalsecret` + Argo UI). Unblock via the seed step.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-env-secrets
  namespace: cogni-candidate-b
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: operator-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: candidate-b/operator
