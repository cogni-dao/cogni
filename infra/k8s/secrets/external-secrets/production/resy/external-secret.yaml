#
# ExternalSecret for resy (node-app) on production — pod cutover off the
# imperative deploy-infra secret-push (task.5094). Mirror of the operator leaf.
#
# Conforms to docs/spec/secrets-management.md Invariant 2 ONE_EXTERNAL_SECRET_
# PER_SERVICE_ENV: one ExternalSecret per (service, env), `dataFrom: extract`
# pulling every key under cogni/production/resy into a single k8s Secret
# `resy-env-secrets`, consumed by the resy overlay via `envFrom: secretRef`
# (+ the doltgres migrator's DOLTGRES_URL secretKeyRef).
#
# OpenBao path seeded by provision Phase 5c's catalog-gated per-node fan-out;
# shared values land denormalized in this node's path (design decision A).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: resy-env-secrets
  namespace: cogni-production
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: resy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: resy-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: production/resy
