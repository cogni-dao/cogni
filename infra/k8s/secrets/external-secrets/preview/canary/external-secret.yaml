#
# ExternalSecret for canary on preview. One service/env path is extracted
# from OpenBao into the single k8s Secret consumed by the workload.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: canary-env-secrets
  namespace: cogni-preview
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: canary
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: canary-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: preview/canary
