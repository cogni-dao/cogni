#
# Top-level kustomization for ExternalSecret manifests (task.0284).
# Includes the cluster-scoped ClusterSecretStore (one per cluster, env-
# independent) plus every per-env aggregator. Applied by deploy-infra.sh
# (Step 7c) after the OpenBao + External Secrets Operator Argo Apps are
# Healthy.
#
# `provision-env-vm.sh` applies only the per-env subtree
# (`candidate-a/`, `preview/`, `production/`) — the ClusterSecretStore is
# cluster-scoped and gets seeded once during cluster bootstrap.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-secret-store.yaml
  - candidate-a
