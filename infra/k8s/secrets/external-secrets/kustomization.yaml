#
# Cluster-scoped ExternalSecret substrate (task.0284). Only the
# ClusterSecretStore lives here — it is env-independent and applied once
# at cluster bootstrap by provision-env-vm.sh Phase 5b.5 via direct
# `kubectl apply -f cluster-secret-store.yaml`.
#
# Per-env ExternalSecret manifests are leaves applied directly by Phase 6
# from the single node-domain SSOT tree: `nodes/<node>/k8s/external-secrets/<env>/`.
# The pre-wizard operator-domain leaf tree under this dir was purged — every node
# now carries its own ExternalSecret leaf in-repo. No per-env aggregator under
# this dir — it leaked a relative-up reference that broke remote apply paths.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-secret-store.yaml
