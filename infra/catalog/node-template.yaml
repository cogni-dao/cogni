name: node-template
type: node
port: 3200
# task.5078 — edge NodePort (see operator.yaml). Must match overlay nodePort.
node_port: 30200
dockerfile: nodes/node-template/app/Dockerfile
# bug.0344 — see infra/catalog/operator.yaml for why these fields exist.
image_tag_suffix: "-node-template"
migrator_tag_suffix: "-node-template-migrate"
source_repo: https://github.com/Cogni-DAO/node-template.git
image_repository: ghcr.io/cogni-dao/node-template
# task.0320 — per-env deploy branches (see operator.yaml).
candidate_a_branch: deploy/candidate-a-node-template
preview_branch: deploy/preview-node-template
production_branch: deploy/production-node-template
# task.5017 — per-env node-set: candidate-a (flightable) + production. Not preview
# (6 GB preview fits ~2-3 nodes; opt in here when preview is sized for it).
envs: [candidate-a, production]
path_prefix: nodes/node-template/
