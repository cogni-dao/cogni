<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cogni Knowledge — 3D Graph Prototype</title>
<!--
  PROTOTYPE — research artifact, not production code.
  Lib: 3d-force-graph (vasturiano, MIT) — Three.js/WebGL force-directed 3D graph.
  Data: shaped to the real knowledge hub schema:
    nodes  = knowledge entries   (id, domain, title, entryType, confidencePct, sourceType)
    edges  = citations           (citingId, citedId, citationType)
    domains= registry            (meta / nodes / infrastructure / governance)
    chains = contributions->commits (branch, baseCommit, commitHash, seq) — the Dolt merkle DAG
  Wire to real data: replace MOCK with GET /api/v1/knowledge (nodes+domains) and a
    citations list endpoint; replace CHAINS with GET /api/v1/knowledge/contributions/:id/commits.
-->
<!-- standalone bundle includes THREE — do NOT also load three.js separately (double-THREE breaks the layout engine) -->
<script src="https://unpkg.com/3d-force-graph@1.80.0/dist/3d-force-graph.min.js"></script>
<style>
  :root{
    --bg:#0a0b0d; --panel:#14161a; --panel2:#1b1e24; --border:#262a31;
    --fg:#e7e9ee; --muted:#8b909a; --accent:#6ea8fe;
    --meta:#a78bfa; --nodes:#34d399; --infrastructure:#fbbf24; --governance:#f472b6;
    --success:#34d399; --destructive:#f87171; --info:#6ea8fe; --neutral:#9aa0aa;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font:13px/1.45 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  #graph{position:fixed;inset:0}
  .panel{position:fixed;background:rgba(20,22,26,.86);backdrop-filter:blur(12px);
    border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  #controls{top:14px;left:14px;width:262px}
  #legend{bottom:14px;left:14px;width:262px}
  #info{top:14px;right:14px;width:300px;max-height:calc(100vh - 28px);overflow:auto;display:none}
  #stats{bottom:14px;right:14px;padding:8px 12px;color:var(--muted);font-variant-numeric:tabular-nums}
  h1{font-size:14px;margin:0 0 2px;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:11px;margin:0 0 12px}
  .group{margin:12px 0 0}
  .group-label{color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-size:10px;margin-bottom:6px}
  .modes{display:flex;gap:6px;margin-bottom:4px}
  button.mode{flex:1;background:var(--panel2);color:var(--muted);border:1px solid var(--border);
    border-radius:8px;padding:7px 6px;cursor:pointer;font-size:12px;transition:.12s}
  button.mode:hover{color:var(--fg)}
  button.mode.active{background:var(--accent);color:#0a0b0d;border-color:var(--accent);font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:7px 0}
  select,input[type=range]{accent-color:var(--accent)}
  select{background:var(--panel2);color:var(--fg);border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:12px}
  label.toggle{display:flex;align-items:center;gap:7px;cursor:pointer;margin:7px 0;color:var(--fg)}
  input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px}
  .legend-item{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .line{width:18px;height:0;border-top:2px solid;flex:0 0 auto}
  .pill{display:inline-block;font:11px ui-monospace,monospace;padding:1px 7px;border-radius:999px;
    border:1px solid var(--border);background:var(--panel2);margin:2px 3px 2px 0}
  #info h2{font-size:14px;margin:0 0 8px;line-height:1.3}
  #info .meta-row{color:var(--muted);font-size:11px;margin:4px 0}
  #info .content{color:#c4c8d0;font-size:12px;margin:10px 0;padding-top:10px;border-top:1px solid var(--border)}
  #info .cite{font:11px ui-monospace,monospace;margin:3px 0}
  .close{float:right;cursor:pointer;color:var(--muted);font-size:16px;line-height:1}
  kbd{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:0 5px;font-size:11px}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="graph"></div>

<div id="controls" class="panel">
  <h1>Cogni Knowledge Graph</h1>
  <p class="sub">3D force prototype · <span id="lib-note">3d-force-graph (MIT)</span></p>

  <div class="modes">
    <button class="mode active" data-mode="tree">Knowledge Tree</button>
    <button class="mode" data-mode="chains">Chains · Merkle</button>
  </div>
  <p class="sub" id="mode-desc" style="margin-top:8px"></p>

  <div class="group" id="tree-controls">
    <div class="group-label">Color nodes by</div>
    <select id="colorBy">
      <option value="domain">Domain</option>
      <option value="entryType">Entry type</option>
      <option value="confidence">Confidence</option>
      <option value="source">Source</option>
    </select>
    <label class="toggle"><input type="checkbox" id="showHubs" checked /> Domain hub nodes</label>
    <label class="toggle"><input type="checkbox" id="curveLinks" /> Curved citation links</label>
    <div class="group">
      <div class="group-label">Filter domain</div>
      <select id="filterDomain"><option value="">All domains</option></select>
    </div>
    <div class="group">
      <div class="row"><span class="group-label" style="margin:0">Link distance</span></div>
      <input type="range" id="linkDist" min="20" max="160" value="70" style="width:100%" />
    </div>
  </div>

  <div class="group" id="chain-controls" style="display:none">
    <label class="toggle"><input type="checkbox" id="dagZ" checked /> Stack commits on Z (merkle depth)</label>
    <p class="sub" style="margin-top:8px">Each contribution = a Dolt branch off <code>main</code>. Commits stack
      by <code>seq</code> along Z; merge edges fold back into the trunk.</p>
  </div>
</div>

<div id="legend" class="panel"></div>

<div id="info" class="panel"><span class="close" onclick="document.getElementById('info').style.display='none'">×</span><div id="info-body"></div></div>

<div id="stats" class="panel"></div>

<script>
/* ----------------------------- palette ----------------------------- */
const DOMAIN_COLOR = { meta:'#a78bfa', nodes:'#34d399', infrastructure:'#fbbf24', governance:'#f472b6' };
const TYPE_COLOR = {
  finding:'#6ea8fe', observation:'#7dd3fc', conclusion:'#a78bfa', rule:'#c084fc',
  scorecard:'#fbbf24', skill:'#34d399', guide:'#2dd4bf', html:'#f472b6',
  hypothesis:'#fbbf24', decision:'#6ea8fe', outcome:'#34d399', event:'#9aa0aa'
};
const SOURCE_COLOR = { human:'#f472b6', agent:'#6ea8fe', external:'#fbbf24', derived:'#34d399', analysis_signal:'#a78bfa' };
// citation edge colors — mirrors ChainPanel.tsx chipFor()
const CITE_COLOR = {
  supports:'#34d399', validates:'#34d399', evidence_for:'#7dd3fc',
  extends:'#6ea8fe', derives_from:'#6ea8fe',
  supersedes:'#fbbf24',
  contradicts:'#f87171', invalidates:'#f87171'
};
const confColor = p => { // red->amber->green ramp
  const t = Math.max(0,Math.min(100,p))/100;
  const r = t<.5 ? 248 : Math.round(248-(248-52)*(t-.5)*2);
  const g = t<.5 ? Math.round(113+(191-113)*t*2) : Math.round(191+(211-191)*(t-.5)*2);
  const b = t<.5 ? 113 : Math.round(113+(153-113)*(t-.5)*2);
  return `rgb(${r},${g},${b})`;
};

/* ----------------------------- mock knowledge (schema-shaped) ----------------------------- */
// Real titles seeded from the live /knowledge table + MEMORY.md themes.
const E = [
  // meta — how the system & agents operate
  ['k-meta-01','meta','Frontend: PRs require dotenv-y + mobile screenshots','rule',90,'human'],
  ['k-meta-02','meta','One PR per task — never split docs-only PRs','rule',85,'human'],
  ['k-meta-03','meta','Monitor all CI gates, not just required','finding',75,'agent'],
  ['k-meta-04','meta','Biome static has non-deterministic per-PR severity','finding',70,'agent'],
  ['k-meta-05','meta','Workflow-file edits silently quarantine CI','finding',80,'agent'],
  ['k-meta-06','meta','Two-watts: how acknowledge:block is stored & shown','guide',65,'agent'],
  ['k-meta-07','meta','MVP-stage reality trumps platform abstractions','conclusion',88,'human'],
  ['k-meta-08','meta','Knowledge chunk formats: scorecards > prose','rule',72,'human'],
  // nodes — per-node product / poly / mobile
  ['k-node-01','nodes','Billing Domain Expert','skill',80,'agent'],
  ['k-node-02','nodes','Poly copy-trade mirror skips when already_placed','finding',68,'agent'],
  ['k-node-03','nodes','Mobile app: Next.js components not RN-reusable','finding',74,'agent'],
  ['k-node-04','nodes','Doltgres spike: extended protocol broken','finding',71,'agent'],
  ['k-node-05','nodes','Knowledge→Obsidian export v0 prototype','guide',60,'agent'],
  ['k-node-06','nodes','Node data stack progression (3-layer)','conclusion',77,'human'],
  ['k-node-07','nodes','Per-tenant Polymarket wallet provisioning','skill',73,'agent'],
  // infrastructure — deploy / secrets / CI-CD / OSS stack
  ['k-infra-01','infrastructure','OSS sandbox runtimes for multiagent AI agents','scorecard',82,'external'],
  ['k-infra-02','infrastructure','OSS auth engines for multitenant AI apps','scorecard',79,'external'],
  ['k-infra-03','infrastructure','OSS CI/CD tech for agents','scorecard',76,'external'],
  ['k-infra-04','infrastructure',"Cogni's OSS infra stack: what we run & why",'conclusion',84,'agent'],
  ['k-infra-05','infrastructure','Node formation wizard birth-to-deploy scorecard','scorecard',81,'agent'],
  ['k-infra-06','infrastructure','New env provisioning to ready-green scorecard','scorecard',78,'agent'],
  ['k-infra-07','infrastructure','ESO/OpenBao is the DB-cred SSOT on all envs','rule',92,'agent'],
  ['k-infra-08','infrastructure','Per-node AppSet live on candidate-a','finding',75,'agent'],
  ['k-infra-09','infrastructure','Node overlay renderer + DNS gap','finding',70,'agent'],
  ['k-infra-10','infrastructure','candidate-a Temporal DNS NXDOMAIN','finding',66,'agent'],
  ['k-infra-11','infrastructure','GH merge queue: report-or-don\'t-require','rule',83,'agent'],
  ['k-infra-12','infrastructure','Node birth is two-tier (k8s + VM/compose)','conclusion',79,'agent'],
  ['k-infra-13','infrastructure','Grafana datasource cache-bust recipe','guide',64,'agent'],
  // governance — DAO / product vision / strategy
  ['k-gov-01','governance','Cogni product = operator as agentic git-manager','conclusion',86,'human'],
  ['k-gov-02','governance','candidate-a flight perms work empirically','finding',77,'agent'],
  ['k-gov-03','governance','deploy_verified is the merge gate for done','rule',88,'human'],
  ['k-gov-04','governance','Knowledge syntropy: refine over extend','rule',90,'human'],
  ['k-gov-05','governance','Two named human stops: needs_review, needs_human_qa','rule',84,'human'],
  ['k-gov-06','governance','Single-node-scope is a CI gate','rule',82,'human'],
];
const NODES = E.map(([id,domain,title,entryType,confidencePct,sourceType])=>({id,domain,title,entryType,confidencePct,sourceType}));

// citations: [citingId, citedId, citationType]
const C = [
  ['k-meta-03','k-meta-05','extends'],
  ['k-meta-04','k-meta-03','supports'],
  ['k-meta-02','k-meta-08','supports'],
  ['k-meta-07','k-gov-01','supports'],
  ['k-meta-01','k-node-03','evidence_for'],
  ['k-infra-04','k-infra-01','derives_from'],
  ['k-infra-04','k-infra-02','derives_from'],
  ['k-infra-04','k-infra-03','derives_from'],
  ['k-infra-07','k-infra-06','supports'],
  ['k-infra-06','k-infra-05','extends'],
  ['k-infra-08','k-infra-12','evidence_for'],
  ['k-infra-09','k-infra-12','evidence_for'],
  ['k-infra-10','k-infra-09','supports'],
  ['k-infra-12','k-infra-05','extends'],
  ['k-infra-11','k-meta-05','supports'],
  ['k-infra-07','k-gov-03','supports'],
  ['k-node-04','k-node-06','evidence_for'],
  ['k-node-05','k-node-06','supports'],
  ['k-node-02','k-node-07','contradicts'],
  ['k-node-01','k-gov-01','supports'],
  ['k-gov-04','k-meta-08','extends'],
  ['k-gov-03','k-gov-05','supports'],
  ['k-gov-02','k-gov-03','validates'],
  ['k-gov-06','k-meta-02','supports'],
  ['k-infra-13','k-infra-10','supports'],
  ['k-infra-12','k-gov-01','derives_from'],
  ['k-node-06','k-infra-04','extends'],
  ['k-gov-01','k-infra-04','supports'],
  ['k-meta-07','k-infra-11','contradicts'],   // MVP-stage vs merge-queue (platform infra)
];

/* ----------------------------- mock chains (Dolt merkle) ----------------------------- */
// A contribution = a branch off main; commits accrue by seq; merge folds into trunk.
// trunk node = the merged main lineage. fake short hashes are illustrative.
const CHAINS = [
  { id:'main', kind:'trunk', commits:['7a1c','b93e','c204','d8f1','e55a'] }, // main lineage (oldest->newest)
  { id:'contrib/oss-infra-matrix', kind:'branch', baseTrunk:'b93e', mergeTrunk:'c204',
    principal:'derek-claude-curitiba', commits:['f01','f02','f03'], target:'k-infra-04' },
  { id:'contrib/eso-ssot', kind:'branch', baseTrunk:'c204', mergeTrunk:'d8f1',
    principal:'agent:secrets', commits:['g01','g02'], target:'k-infra-07' },
  { id:'contrib/node-birth-rails', kind:'branch', baseTrunk:'c204', mergeTrunk:'e55a',
    principal:'agent:birth', commits:['h01','h02','h03','h04'], target:'k-infra-12' },
  { id:'contrib/knowledge-syntropy', kind:'branch', baseTrunk:'d8f1', mergeTrunk:null, // still open
    principal:'derek', commits:['i01','i02'], target:'k-gov-04' },
];

/* ----------------------------- graph build ----------------------------- */
let Graph, currentMode='tree';
const el = id => document.getElementById(id);

function buildTreeData(){
  const showHubs = el('showHubs').checked;
  const fd = el('filterDomain').value;
  const domains = [...new Set(NODES.map(n=>n.domain))];
  const hubs = showHubs ? domains.map(d=>({
    id:'hub:'+d, isHub:true, domain:d, title:d, entryCount:NODES.filter(n=>n.domain===d).length
  })) : [];
  const entries = NODES.filter(n=>!fd || n.domain===fd).map(n=>({...n}));
  const keep = new Set(entries.map(n=>n.id));
  const links = [];
  if(showHubs) for(const n of entries) links.push({source:'hub:'+n.domain, target:n.id, kind:'member'});
  for(const [s,t,ct] of C){ if(keep.has(s)&&keep.has(t)) links.push({source:s,target:t,kind:'cite',citationType:ct}); }
  return { nodes:[...hubs.filter(h=>!fd||h.domain===fd), ...entries], links };
}

function buildChainData(){
  const nodes=[], links=[];
  const z = el('dagZ').checked;
  const SP = 46; // Z spacing per merkle step
  const trunk = CHAINS.find(c=>c.kind==='trunk');
  // trunk commits march straight back along Z (the spine of the merkle history)
  trunk.commits.forEach((h,i)=>{
    nodes.push({id:'main@'+h, hash:h, isTrunk:true, seq:i, title:'main · '+h, fx:0, fy:0, fz: z ? i*-SP : 0 });
    if(i>0) links.push({source:'main@'+trunk.commits[i-1], target:'main@'+h, kind:'trunk'});
  });
  // contribution branches fan out in X/Y lanes; each commit advances one Z step
  CHAINS.filter(c=>c.kind==='branch').forEach((b,bi)=>{
    const lane = (bi%2?1:-1)*(46+26*Math.floor(bi/2));
    const baseIdx = trunk.commits.indexOf(b.baseTrunk);
    let prev = 'main@'+b.baseTrunk;
    b.commits.forEach((h,i)=>{
      const id = b.id+'@'+h;
      nodes.push({ id, hash:h, branch:b.id, principal:b.principal, target:b.target,
        title:b.id.replace('contrib/','')+' · '+h, open:b.mergeTrunk===null,
        fx:lane, fy:(i+1)*16*(bi%2?1:-1), fz: z ? (baseIdx+i+1)*-SP : 0 });
      links.push({source:prev, target:id, kind:'branch'}); prev=id;
    });
    if(b.mergeTrunk) links.push({source:prev, target:'main@'+b.mergeTrunk, kind:'merge'});
  });
  return {nodes,links};
}

function nodeColor(n){
  if(n.isHub) return DOMAIN_COLOR[n.domain]||'#888';
  if(n.isTrunk) return '#e7e9ee';
  if(n.branch) return n.open ? '#fbbf24' : '#6ea8fe';
  const by = el('colorBy').value;
  if(by==='domain') return DOMAIN_COLOR[n.domain]||'#888';
  if(by==='entryType') return TYPE_COLOR[n.entryType]||'#888';
  if(by==='source') return SOURCE_COLOR[n.sourceType]||'#888';
  return confColor(n.confidencePct||0);
}
function nodeVal(n){
  if(n.isHub) return 22;
  if(n.isTrunk) return 7;
  if(n.branch) return 4;
  return 2 + (n.confidencePct||40)/22;
}
function linkColor(l){
  if(l.kind==='member') return 'rgba(120,128,140,.22)';
  if(l.kind==='trunk') return 'rgba(231,233,238,.9)';
  if(l.kind==='branch') return 'rgba(110,168,254,.7)';
  if(l.kind==='merge') return 'rgba(52,211,153,.8)';
  return CITE_COLOR[l.citationType]||'#9aa0aa';
}

function applyMode(){
  if(currentMode==='tree'){
    const data = buildTreeData();
    Graph.d3Force('link').distance(+el('linkDist').value); // set before graphData; engine not yet ticking
    Graph.dagMode(null)
      .nodeColor(nodeColor).nodeVal(nodeVal)
      .nodeLabel(n=> n.isHub
        ? `<b>${n.domain}</b> · ${n.entryCount} entries`
        : `<div style="max-width:240px"><b>${n.title}</b><br><span style="color:#8b909a">${n.id} · ${n.entryType} · ${n.confidencePct}%</span></div>`)
      .linkColor(linkColor)
      .linkWidth(l=> l.kind==='cite'?1.4:0.5)
      .linkDirectionalParticles(l=> l.kind==='cite'?2:0)
      .linkDirectionalParticleWidth(1.6)
      .linkCurvature(el('curveLinks').checked?0.25:0)
      .linkDirectionalArrowLength(l=> l.kind==='cite'?3:0)
      .onNodeClick(showInfo)
      .graphData(data);
  } else {
    const data = buildChainData();
    Graph.dagMode(null) // coordinates are hard-pinned (fx/fy/fz) — no force DAG layout
      .nodeColor(nodeColor).nodeVal(nodeVal)
      .nodeLabel(n=> n.isTrunk
        ? `main lineage · commit <b>${n.hash}</b>`
        : `<div><b>${n.branch}</b><br><span style="color:#8b909a">commit ${n.hash} · by ${n.principal}${n.open?' · OPEN':''}<br>refines ${n.target}</span></div>`)
      .linkColor(linkColor)
      .linkWidth(l=> l.kind==='trunk'?2.4:1.4)
      .linkDirectionalParticles(l=> l.kind==='merge'?3:0)
      .linkDirectionalParticleWidth(2)
      .linkDirectionalArrowLength(4).linkDirectionalArrowRelPos(1)
      .linkCurvature(0)
      .onNodeClick(showChainInfo)
      .graphData(data);
  }
  renderLegend();
  renderStats();
}

/* ----------------------------- panels ----------------------------- */
function showInfo(n){
  if(n.isHub) return;
  const cites = C.filter(c=>c[0]===n.id).map(c=>`<div class="cite" style="color:${CITE_COLOR[c[2]]}">→ ${c[2]} · ${c[1]}</div>`).join('');
  const cited = C.filter(c=>c[1]===n.id).map(c=>`<div class="cite" style="color:${CITE_COLOR[c[2]]}">← ${c[2]} · ${c[0]}</div>`).join('');
  el('info-body').innerHTML = `
    <span class="close" onclick="info.style.display='none'">×</span>
    <h2>${n.title}</h2>
    <div class="meta-row">${n.id}</div>
    <div><span class="pill" style="color:${DOMAIN_COLOR[n.domain]}">${n.domain}</span>
      <span class="pill">${n.entryType}</span>
      <span class="pill">${n.sourceType}</span>
      <span class="pill" style="color:${confColor(n.confidencePct)}">${n.confidencePct}%</span></div>
    ${cites||cited?`<div class="content"><b>Citations</b>${cites}${cited}</div>`:''}`;
  el('info').style.display='block';
}
function showChainInfo(n){
  el('info-body').innerHTML = `
    <span class="close" onclick="info.style.display='none'">×</span>
    <h2>${n.isTrunk?'main lineage':n.branch}</h2>
    <div class="meta-row">commit <b>${n.hash}</b>${n.open?' · <span style="color:#fbbf24">OPEN branch</span>':''}</div>
    ${n.principal?`<div class="meta-row">author: ${n.principal}</div>`:''}
    ${n.target?`<div class="content">refines entry <b>${n.target}</b><br><span style="color:#8b909a">Dolt branch off main; merges fold the merkle DAG back into the trunk.</span></div>`:''}`;
  el('info').style.display='block';
}

function renderLegend(){
  let h='';
  if(currentMode==='tree'){
    const by = el('colorBy').value;
    const map = by==='domain'?DOMAIN_COLOR : by==='entryType'?TYPE_COLOR : by==='source'?SOURCE_COLOR : null;
    h += `<div class="group-label">Nodes — ${by}</div>`;
    if(map) for(const [k,v] of Object.entries(map)) h+=`<div class="legend-item"><span class="dot" style="background:${v}"></span>${k}</div>`;
    else h += `<div class="legend-item"><span class="dot" style="background:${confColor(20)}"></span>low → <span class="dot" style="background:${confColor(90)};margin-left:6px"></span>high confidence</div>`;
    h += `<div class="group-label" style="margin-top:10px">Citation edges</div>`;
    const seen=new Set();
    for(const [,, ct] of C){ if(seen.has(ct))continue; seen.add(ct);
      h+=`<div class="legend-item"><span class="line" style="border-color:${CITE_COLOR[ct]}"></span>${ct}</div>`; }
  } else {
    h += `<div class="group-label">Dolt merkle DAG</div>
      <div class="legend-item"><span class="dot" style="background:#e7e9ee"></span>main commit (trunk)</div>
      <div class="legend-item"><span class="dot" style="background:#6ea8fe"></span>merged contribution</div>
      <div class="legend-item"><span class="dot" style="background:#fbbf24"></span>open branch</div>
      <div class="legend-item"><span class="line" style="border-color:rgba(231,233,238,.9)"></span>trunk lineage</div>
      <div class="legend-item"><span class="line" style="border-color:#6ea8fe"></span>branch commits</div>
      <div class="legend-item"><span class="line" style="border-color:#34d399"></span>merge → main</div>`;
  }
  el('legend').innerHTML = h;
}
function renderStats(){
  const d = currentMode==='tree'?buildTreeData():buildChainData();
  const ents = currentMode==='tree'?d.nodes.filter(n=>!n.isHub).length:d.nodes.length;
  el('stats').textContent = currentMode==='tree'
    ? `${ents} entries · ${d.links.filter(l=>l.kind==='cite').length} citations · ${Object.keys(DOMAIN_COLOR).length} domains`
    : `${CHAINS.filter(c=>c.kind==='branch').length} contributions · ${d.nodes.length} commits`;
}

/* ----------------------------- init ----------------------------- */
function init(){
  Graph = ForceGraph3D()(el('graph'))
    .backgroundColor('#0a0b0d')
    .showNavInfo(false)
    .nodeOpacity(0.92)
    .nodeResolution(12)
    .linkOpacity(0.6)
    .width(window.innerWidth).height(window.innerHeight);

  // populate domain filter
  [...new Set(NODES.map(n=>n.domain))].forEach(d=>{
    const o=document.createElement('option'); o.value=d; o.textContent=d; el('filterDomain').appendChild(o);
  });

  document.querySelectorAll('button.mode').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('button.mode').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); currentMode=b.dataset.mode;
    el('tree-controls').style.display = currentMode==='tree'?'block':'none';
    el('chain-controls').style.display = currentMode==='chains'?'block':'none';
    el('mode-desc').textContent = currentMode==='tree'
      ? 'Domains (hubs) cluster their entries; citation edges link entries across the whole tree.'
      : 'Revision history as a 3D DAG — contribution branches stack on Z by merkle depth, merges fold into main.';
    el('info').style.display='none';
    applyMode();
    setTimeout(()=>{
      if(currentMode==='chains') Graph.cameraPosition({x:260,y:120,z:200},{x:0,y:0,z:-110},800);
      else Graph.zoomToFit(600,80);
    }, 350);
  });

  ['colorBy','showHubs','curveLinks','filterDomain','dagZ'].forEach(id=>el(id).onchange=applyMode);
  el('linkDist').oninput=()=>{ if(currentMode==='tree'){ Graph.d3Force('link').distance(+el('linkDist').value); Graph.d3ReheatSimulation(); } };
  window.onresize=()=>Graph.width(window.innerWidth).height(window.innerHeight);

  el('mode-desc').textContent='Domains (hubs) cluster their entries; citation edges link entries across the whole tree.';
  applyMode();
  setTimeout(()=>Graph.zoomToFit(600,80), 500);
}
window.addEventListener('load', init);
</script>
</body>
</html>
