# Per-node secrets catalog for the node-template node.
# `service:` auto-resolves to `node-template` (the parent dir) — entries here fan
# out to ONLY the node-template pod. This is the self-serve declaration surface:
# a node dev adds a secret here in one PR, their domain, and the catalog-SSOT
# provisioner (Invariant 14 CATALOG_IS_THE_ONE_READER) fans it out with zero
# operator-domain edits. See docs/spec/secrets-management.md §Self-Serve Model.
secrets:
  # E2E proof probe (task.5104). Throwaway: no app code consumes it. source: agent
  # so provisioning seeds a generated value itself — proves declare→OpenBao→ESO→
  # Reloader→pod end-to-end WITHOUT depending on the Atom-2 value-write path.
  # Verify on candidate-a: `kubectl exec` printenv shows it in the node-template
  # pod, having touched only this file. Safe to delete once the loop is proven.
  - name: NODE_TEMPLATE_SELFSERVE_PROBE
    tier: A2
    source: agent
    required: false
    shared: false
    category: "Self-Serve Proof (task.5104)"
    description: Throwaway probe proving a per-node catalog entry reaches the pod.
    generate: { kind: hex, bytes: 16 }
    steps:
      ["Auto-generated; no action. Delete once the self-serve loop is proven."]
